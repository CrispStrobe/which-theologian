  .info-tooltip { visibility: hidden; width: 180px; background-color: var(--parchment-dark); color: var(--ink); text-align: center; border: 1px solid var(--gold); border-radius: 2px; padding: 0.5rem; position: absolute; z-index: 10; bottom: 125%; right: 0; opacity: 0; transition: opacity 0.3s; font-size: 0.7rem; font-family: 'Georgia', serif; font-style: normal; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

  .result-dates { font-family: 'Georgia', serif; font-size:0.9rem; color:var(--sepia); font-style:italic; margin-bottom:1.2rem; }
  .result-divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:1.2rem auto; }
  .result-desc { font-size:1.03rem; color:#3a2210; line-height:1.78; text-align:left; margin-bottom:1.5rem; }
  .result-traits { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin-bottom:2rem; }
  .trait { font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.8rem; border:1px solid var(--gold); color:var(--sepia); border-radius:1px; }
  .score-section-label { font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:0.8rem; text-align:left; }

  .score-bar-track { height:5px; background:var(--parchment-dark); border-radius:2px; overflow:hidden; }

  .score-bar-fill.is-top { background:linear-gradient(90deg,var(--burgundy),var(--gold)); }
  @keyframes fadeUp    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  @keyframes fadeRight { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }

  }

<script>
const data = {
  en: {
    title: "Which Theologian Are You?",
    subtitle: "Eighteen questions on grace, theosis, reason, faith & the soul's journey to God",
    questionLabel: "Question",
    ofLabel: "of",
    completeLabel: "complete",
    backBtn: "← Back",
    continueBtn: "Continue →",

    showScoringLabel: "Show Scoring",
    modal: {
      title: "About this Quiz",
      p1: "This quiz originates from <strong>Jordan Vale</strong> (<a href=\"https://substack.com/@theologymade\" target=\"_blank\">Theology Made</a>).",
      p2: "Original Quiz: <a href=\"https://whichtheologianareyou.netlify.app\" target=\"_blank\">whichtheologianareyou.netlify.app</a>",
      p3: "The German translation is provided with courtesy (<a href=\"https://substack.com/@theologymade/note/c-238522947?utm_source=notes-share-action&r=868noo\" target=\"_blank\">source</a>).",
      imprintTitle: "Imprint / Legal",
      serviceProvider: "<strong>Service Provider:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany",
      contact: "<strong>Contact:</strong><br>Email: <a href=\"mailto:postmaster@crispstro.be\">postmaster@crispstro.be</a><br>Phone: 0049 176 6421 8601",
      responsible: "<strong>Responsible for Content:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany",
      disclaimerTitle: "Disclaimer",
      disclaimerText: "This app is provided as is, exclusively for educational and creative purposes, without any liability.<br><a href=\"https://www.crispstro.be\" target=\"_blank\">www.crispstro.be</a>"
    },
    theologians: {
      Augustine: { name:"Augustine of Hippo", tradition:"Western / Catholic", dates:"354 – 430 AD", traits:["Original Sin","Divine Grace","City of God","Confessions","Restless Heart"], desc:"You resonate deeply with Augustine — the great North African bishop whose life was a drama of restlessness and redemption. Like Augustine, you are profoundly aware of the human heart's tendency to wander, and equally convinced that only God can fill the void. You think in large, sweeping categories: two cities, two loves, two destinies. Theology, for you, is never merely academic — it is autobiographical. The hunger for beauty, truth, and rest in God is the through-line of everything you believe." },
      Athanasius: { name:"Athanasius of Alexandria", tradition:"Eastern Orthodox", dates:"c. 296 – 373 AD", traits:["Nicene Orthodoxy","Theosis","Incarnation","Contra Mundum","Trinity"], desc:"You share the unbending conviction of Athanasius — the bishop who stood contra mundum (against the world) to defend the full divinity of Christ when almost everyone else compromised. Like Athanasius, you believe the Incarnation is everything: God truly became human so that humans might truly share in divine life. You hold the faith tenaciously, not out of stubbornness, but because you know exactly what is at stake if the Church gets it wrong. Orthodoxy is not a technicality for you — it is the difference between life and death." },
      Aquinas: { name:"Thomas Aquinas", tradition:"Western / Catholic", dates:"1225 – 1274 AD", traits:["Natural Law","Faith & Reason","Summa Theologiae","Five Ways","Scholasticism"], desc:"You carry the soul of Thomas Aquinas — the 'Dumb Ox' whose vast, ordered mind built a cathedral of thought out of faith and reason. Like Aquinas, you believe that grace perfects nature rather than destroying it, that philosophy and theology are allies rather than enemies, and that truth encountered anywhere ultimately belongs to God. You are patient, systematic, and convinced that reality holds together — that the created world is sacramental, pointing beyond itself to its Maker." },
      Anselm: { name:"Anselm of Canterbury", tradition:"Western / Catholic", dates:"1033 – 1109 AD", traits:["Fides Quaerens Intellectum","Ontological Argument","Cur Deus Homo","Satisfaction Atonement","Scholasticism"], desc:"You think with the luminous precision of Anselm of Canterbury — the father of scholasticism whose motto was fides quaerens intellectum: faith seeking understanding. Like Anselm, you are not content merely to believe — you want to understand what you believe, as deeply as the mind can reach. You see no contradiction between rigorous argument and ardent faith. Your famous ontological argument was not a cold logical trick but an act of prayer — a mind in love with God, reaching for clarity about the One it loves." },
      Luther: { name:"Martin Luther", tradition:"Lutheran / Protestant", dates:"1483 – 1546 AD", traits:["Sola Fide","Sola Scriptura","Justification","The Reformation","Grace Alone"], desc:"You carry the fire of Martin Luther — the Augustinian monk whose anguished search for a gracious God sparked the Reformation. Like Luther, you are gripped by the radical freedom of the Gospel: we are justified by grace alone, through faith alone, in Christ alone. Scripture is your supreme authority. You have little patience for religious systems that burden consciences with what God has already accomplished freely. When you stand for something, you stand — and you do not move." },
      Calvin: { name:"John Calvin", tradition:"Reformed / Protestant", dates:"1509 – 1564 AD", traits:["Sovereignty of God","Predestination","TULIP","Sola Scriptura","Reformed Theology"], desc:"You think with the disciplined clarity of John Calvin — the reformer of Geneva whose theology begins and ends with the absolute sovereignty of God. Like Calvin, you find comfort not in your own choosing of God, but in God's choosing of you. Scripture governs all of life: worship, politics, community, and the individual soul. You are drawn to rigorous consistency, and you want your theology to be not just true but total — a framework for seeing all of reality under the lordship of Christ." },
      Chrysostom: { name:"John Chrysostom", tradition:"Eastern Orthodox", dates:"c. 349 – 407 AD", traits:["Golden Mouth","Care for the Poor","Homiletics","Social Justice","Liturgy"], desc:"You burn with the eloquent passion of John Chrysostom — the 'Golden-Mouthed' preacher of Antioch and Constantinople who declared that the altar of the poor is as sacred as the altar of the Eucharist. Like Chrysostom, you cannot separate love of God from concrete love of neighbor. You preach with heat and clarity, refuse to flatter the powerful, and believe the Church's greatest test is not its doctrine but its treatment of the hungry and the homeless. For you, theology always ends in the street." },
      Maximus: { name:"Maximus the Confessor", tradition:"Eastern Orthodox", dates:"c. 580 – 662 AD", traits:["Cosmic Christology","Theosis","Logos & Logoi","Recapitulation","Divine Energies"], desc:"You think with the breathtaking cosmic vision of Maximus the Confessor — the Byzantine theologian who saw all of creation as a vast web of divine meanings (logoi) held together in the eternal Logos. Like Maximus, you believe the whole created order is moving toward its final offering-up to God in love. Christ is not merely Savior but the very axis around which the universe turns. You are drawn to synthesis: nature and grace, body and soul, time and eternity — all things ultimately reconciled and offered up in him. You believe truth is worth suffering for, and you paid the price." },
      Barth: { name:"Karl Barth", tradition:"Reformed / Neo-Orthodox", dates:"1886 – 1968 AD", traits:["Neo-Orthodoxy","Word of God","Christocentrism","Church Dogmatics","Revelation"], desc:"You think with the bold Christocentrism of Karl Barth — the Swiss theologian who said a thundering No to liberal theology and called the church back to the strange, sovereign Word of God. Like Barth, you believe theology must begin with God's self-revelation in Jesus Christ — not human experience, philosophy, or natural theology. Every theological question leads back to him. You are suspicious of systems that tame the living God, and you believe the church must hear the Word afresh in every age." },
      Edwards: { name:"Jonathan Edwards", tradition:"Reformed / Calvinist", dates:"1703 – 1758 AD", traits:["Religious Affections","Revival","Beauty of God","Sovereignty","Great Awakening"], desc:"You share the awe-struck vision of Jonathan Edwards — the New England theologian and revivalist who experienced God's sovereignty not as cold doctrine but as overwhelming, terrible beauty. Like Edwards, you believe that true religion is not merely intellectual assent but a transformation of the affections — a new sense of the heart, enkindled by the Spirit. You have a keen eye for the glory of God shining through nature and Scripture alike, and you know that genuine revival begins when the beauty of God breaks into ordinary life." },
      Wesley: { name:"John Wesley", tradition:"Methodist / Arminian", dates:"1703 – 1791 AD", traits:["Entire Sanctification","Prevenient Grace","Methodist Movement","Social Holiness","Means of Grace"], desc:"You carry the warm-hearted faith of John Wesley — the Oxford don whose heart was 'strangely warmed' and who then set England ablaze with the Gospel. Like Wesley, you believe that grace is genuinely available to all, that the Christian life is a journey toward entire sanctification, and that personal holiness is inseparable from social holiness. You are both methodical and passionate — you believe in means of grace, in small groups, in accountability, and in reaching the people polite religion has left behind." },
      Lewis: { name:"C.S. Lewis", tradition:"Anglican / Mere Christianity", dates:"1898 – 1963 AD", traits:["Apologetics","Mere Christianity","Imagination","Joy","Reason & Faith"], desc:"You share the imaginative faith of C.S. Lewis — the Oxford don whose journey from atheism to Christianity produced some of the most beloved apologetics of the twentieth century. Like Lewis, you believe reason and imagination are both paths to truth, that Joy is a clue pointing beyond itself to God, and that the Christian story is not just true but the most beautiful and coherent story on offer. You love ideas, you love stories, and you believe that helping someone see things clearly can be a deeply spiritual act." },
      Teresa: { name:"Teresa of Ávila", tradition:"Catholic / Carmelite Mysticism", dates:"1515 – 1582 AD", traits:["Interior Castle","Contemplative Prayer","Mysticism","Divine Union","Doctor of the Church"], desc:"You are drawn into the mystical depths of Teresa of Ávila — the Spanish Carmelite reformer and Doctor of the Church whose Interior Castle mapped the soul's journey toward union with God. Like Teresa, you know that theology is ultimately about encounter, not information. Prayer is not a duty but a relationship — sometimes difficult, sometimes luminous, always essential. You have a profound sense of the soul's dignity and its capacity to be transformed by the living, indwelling presence of God." },
      Bonhoeffer: { name:"Dietrich Bonhoeffer", tradition:"Lutheran / Confessing Church", dates:"1906 – 1945 AD", traits:["Costly Grace","Discipleship","Ethics","Resistance","Life Together"], desc:"You share the costly faith of Dietrich Bonhoeffer — the German theologian and pastor executed by the Nazis for his resistance to Hitler. Like Bonhoeffer, you believe that grace is not cheap — it demands everything. The church must take concrete form in the world; it cannot retreat into piety while the neighbor suffers. Theology, for you, is always on the way to action. You are gripped by the question: what does it actually look like to follow Jesus — not in theory, but here, now, at whatever cost?" },
    },
    questions: [
      { text: "What is the primary source of Christian truth?", options: [
        { text: "Scripture alone — the written Word is the supreme and final authority.", scores: {Luther:3,Calvin:2} },
        { text: "Scripture and Holy Tradition together, faithfully held by the Church across the ages.", scores: {Athanasius:3,Chrysostom:2,Maximus:1} },
        { text: "Scripture, tradition, and reason in harmony — each illuminating the others.", scores: {Aquinas:3,Lewis:2,Anselm:1} },
        { text: "The living Word of God — Christ himself, speaking freshly in every generation.", scores: {Barth:3,Bonhoeffer:1} }
      ]},
      { text: "What is the ultimate goal of the Christian life?", options: [
        { text: "Theosis — a genuine participation in the divine nature, transforming the whole person in Christ.", scores: {Maximus:3,Athanasius:2,Teresa:1} },
        { text: "Entire sanctification — the heart wholly purified and filled with perfect love for God and neighbor.", scores: {Wesley:3} },
        { text: "To glorify God and enjoy him forever — our chief end is his eternal praise.", scores: {Calvin:3,Edwards:2} },
        { text: "To rest in God — our hearts are restless until they repose in him.", scores: {Augustine:3,Anselm:1} }
      ]},
      { text: "How do you think about salvation?", options: [
        { text: "God sovereignly elects his own before the foundation of the world — salvation is entirely his work.", scores: {Calvin:3,Augustine:1,Edwards:1} },
        { text: "Grace alone, through faith alone — justification is God's free declaration, not something earned.", scores: {Luther:3,Anselm:1} },
        { text: "Prevenient grace reaches all; we freely respond to God's prior, pursuing love.", scores: {Wesley:3} },
        { text: "A transformation of the entire person — body, soul, and will — into the likeness of Christ.", scores: {Maximus:3,Athanasius:2,Augustine:1} }
      ]},
      { text: "What role does human reason play in faith?", options: [
        { text: "Faith seeking understanding — reason is the faithful handmaid of revealed truth.", scores: {Anselm:3,Aquinas:2} },
        { text: "Reason and imagination together build a cumulative case for Christianity.", scores: {Lewis:3,Aquinas:1} },
        { text: "Reason is deeply fallen; revelation alone can truly disclose who God is.", scores: {Barth:3,Luther:1} },
        { text: "Reason illumines the natural order — but must be crowned and elevated by grace.", scores: {Aquinas:3,Maximus:1} }
      ]},
      { text: "How do you understand the Incarnation?", options: [
        { text: "God became human so that humans might become partakers of the divine nature.", scores: {Athanasius:3,Maximus:2} },
        { text: "The Word became flesh to satisfy the debt of sin and restore our honor before God.", scores: {Anselm:3,Luther:1} },
        { text: "In Christ, God speaks his definitive Word — the Incarnation is the center of all theology.", scores: {Barth:3,Bonhoeffer:1} },
        { text: "The Incarnation reveals the depth of God's love and the dignity of every human person.", scores: {Chrysostom:3,Lewis:1} }
      ]},
      { text: "Which image best captures the Christian life?", options: [
        { text: "Pilgrims traveling through the City of Man toward the eternal City of God.", scores: {Augustine:3} },
        { text: "A castle with many interior rooms — the soul journeying ever deeper toward union with God.", scores: {Teresa:3} },
        { text: "A cosmic ascent — all of creation being gathered and lovingly offered back to its Creator.", scores: {Maximus:3,Athanasius:1} },
        { text: "A courtroom — the guilty sinner declared righteous by the judge through faith alone.", scores: {Luther:3,Calvin:1} }
      ]},
      { text: "How do you engage with philosophy and the intellectual tradition?", options: [
        { text: "I synthesize faith and philosophy into a grand unified vision of all reality.", scores: {Aquinas:3,Maximus:1} },
        { text: "Philosophy is a useful sparring partner — I use it to defend and illuminate the faith.", scores: {Anselm:3,Lewis:2} },
        { text: "I am deeply wary of philosophy; God's revelation in Christ judges all human wisdom.", scores: {Barth:3,Luther:1} },
        { text: "The wisdom of the ancient world, rightly received, can be a servant of the Gospel.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} }
      ]},
      { text: "What is your view on grace?", options: [
        { text: "Sovereign, irresistible, and particular — God unconditionally elects those he saves.", scores: {Calvin:3,Edwards:1} },
        { text: "Freely given, utterly unmerited — it transforms the soul from within across a whole lifetime.", scores: {Augustine:3,Luther:1} },
        { text: "The felt, empowering presence of the Holy Spirit — genuinely available to all who open themselves.", scores: {Wesley:3,Teresa:1} },
        { text: "The very energies of God, communicated to the soul through prayer and the sacraments.", scores: {Maximus:3,Athanasius:1} }
      ]},
      { text: "What is the church's primary calling?", options: [
        { text: "To preach the pure Word and rightly celebrate the sacraments — everything flows from that.", scores: {Luther:3,Calvin:1} },
        { text: "To care for the poor, the widow, and the stranger — practical mercy is its heartbeat.", scores: {Chrysostom:3,Wesley:1,Bonhoeffer:1} },
        { text: "To be a community of costly discipleship — the body of Christ taking form in the world.", scores: {Bonhoeffer:3} },
        { text: "To worship God in the fullness of liturgy and sacrament, transmitting the faith whole and entire.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} }
      ]},
      { text: "How do you think about the poor and wealth?", options: [
        { text: "The poor are the body of Christ — hoarding wealth while they suffer is a grave sin.", scores: {Chrysostom:3,Wesley:1} },
        { text: "Stewardship of all we have must be rendered to God — we own nothing, we manage everything.", scores: {Calvin:3,Edwards:1} },
        { text: "Love of neighbor means the whole of life — including economics — must be transformed.", scores: {Wesley:2,Bonhoeffer:2} },
        { text: "Material goods are real but secondary — the soul's journey to God is what ultimately matters.", scores: {Teresa:3,Augustine:1} }
      ]},
      { text: "How do you describe prayer?", options: [
        { text: "A deep, wordless communion — the soul stilled and receptive before the divine presence.", scores: {Teresa:3,Maximus:1} },
        { text: "Passionate, Scripture-soaked conversation with a God who has made clear and binding promises.", scores: {Luther:3,Calvin:1} },
        { text: "The heart's affections raised toward God — love is the truest language of prayer.", scores: {Edwards:3,Augustine:1} },
        { text: "Liturgical, communal, and sacramental — the whole Body of Christ praying with one voice.", scores: {Chrysostom:3,Athanasius:1} }
      ]},
      { text: "Which aspect of Jesus grips you most?", options: [
        { text: "His atoning sacrifice — the one who bore our sin and fully satisfied divine justice.", scores: {Anselm:3,Luther:2,Calvin:1} },
        { text: "His resurrection — God's triumphant Yes over death and all the powers that oppose life.", scores: {Barth:3,Athanasius:2} },
        { text: "His humanity and teaching — the Word made flesh, showing us how to live.", scores: {Lewis:3,Chrysostom:1} },
        { text: "His cosmic lordship — the one in whom all things hold together and are finally recapitulated.", scores: {Maximus:3,Athanasius:1} }
      ]},
      { text: "How do you face seasons of doubt or spiritual dryness?", options: [
        { text: "I build arguments — if God exists, what follows? Reason clears a great deal of fog.", scores: {Lewis:3,Anselm:2} },
        { text: "I return to the Word and its promises — not my feelings, but what God has actually said.", scores: {Luther:3,Barth:1} },
        { text: "I press through in contemplative prayer until the darkness gradually gives way to light.", scores: {Teresa:3,Maximus:1} },
        { text: "Doubt calls me to action — faith is tested and purified in costly obedience.", scores: {Bonhoeffer:3,Wesley:1} }
      ]},
      { text: "What draws you most to theology?", options: [
        { text: "A lifelong wrestling with sin, restlessness, and the deep hunger for God.", scores: {Augustine:3,Luther:1} },
        { text: "A longing to know God — not merely to know about God.", scores: {Teresa:3,Edwards:2,Maximus:1} },
        { text: "A desire to defend and articulate the faith once delivered to the saints.", scores: {Athanasius:3,Anselm:2} },
        { text: "The overwhelming beauty and terror of God's sovereign majesty.", scores: {Edwards:3,Calvin:1} }
      ]},
      { text: "How should Christians engage the political world?", options: [
        { text: "Two kingdoms — the church must not be captured by the state, nor simply abandon it.", scores: {Luther:3,Augustine:1} },
        { text: "All of life falls under God's sovereignty — Scripture should shape all of society.", scores: {Calvin:3,Edwards:1} },
        { text: "When the state becomes demonic, the church must resist — even at the cost of life itself.", scores: {Bonhoeffer:3} },
        { text: "Justice for the poor is a political demand — the church must speak plainly for the vulnerable.", scores: {Chrysostom:3,Wesley:1} }
      ]},
      { text: "What is your view of the created world?", options: [
        { text: "Creation is a gift whose deepest calling is to be offered back to God in love.", scores: {Maximus:3,Athanasius:1} },
        { text: "Creation reflects eternal law and points, through reason, back to its Creator.", scores: {Aquinas:3,Lewis:1} },
        { text: "Creation is fallen but redeemable — beauty remains, shot through with traces of God.", scores: {Augustine:3,Lewis:1} },
        { text: "The world is a theatre of God's glory — his sovereignty is written into every corner of it.", scores: {Calvin:3,Edwards:2} }
      ]},
      { text: "Which theological question grips you most?", options: [
        { text: "Why do we sin so persistently, and how can grace set us finally and truly free?", scores: {Augustine:3,Luther:1} },
        { text: "How does all of creation find its unity, its meaning, and its end in the eternal Logos?", scores: {Maximus:3,Athanasius:1} },
        { text: "What is the soul, and how does it ascend through prayer toward union with God?", scores: {Teresa:3,Augustine:1} },
        { text: "What does the new birth feel like — and how does genuine holiness actually grow in us?", scores: {Wesley:3,Edwards:2} }
      ]},
      { text: "Which phrase resonates most with your theological heart?", options: [
        { text: "\"Our heart is restless, until it rests in you.\" — Augustine", scores: {Augustine:3} },
        { text: "\"He became man that we might become God.\" — Athanasius", scores: {Athanasius:3,Maximus:1} },
        { text: "\"The Logos holds all things together — and draws all things home.\" — Maximus (paraphrase)", scores: {Maximus:3} },
        { text: "\"Grace does not destroy nature, but perfects it.\" — Aquinas", scores: {Aquinas:3} },
        { text: "\"Credo ut intelligam — I believe so that I may understand.\" — Anselm", scores: {Anselm:3} },
        { text: "\"Here I stand. I can do no other.\" — Luther (traditional attribution)", scores: {Luther:3} },
        { text: "\"We are not our own; we belong to God.\" — Calvin", scores: {Calvin:3} },
        { text: "\"God's Word cannot be imprisoned — it must be heard anew in every generation.\" — Barth (paraphrase)", scores: {Barth:3} },
        { text: "\"I believe in Christianity as I believe that the sun has risen: not only because I see it, but because by it I see everything else.\" — Lewis", scores: {Lewis:3} },
        { text: "\"The soul in prayer is like one beginning to die to the world.\" — Teresa (paraphrase)", scores: {Teresa:3} },
        { text: "\"Cheap grace is the deadly enemy of our church.\" — Bonhoeffer", scores: {Bonhoeffer:3} },
        { text: "\"The wealth you keep is stolen from the poor.\" — Chrysostom", scores: {Chrysostom:3} },
        { text: "\"True religion is nothing but the love of God and man.\" — Wesley (paraphrase)", scores: {Wesley:3} },
        { text: "\"The heart has no rest until it trembles before the beauty of God.\" — Edwards (paraphrase)", scores: {Edwards:3} }
      ]}
    ]
  },

    modal: {

      p3: "Die deutsche Übersetzung wurde freundlicherweise zur Verfügung gestellt (<a href=\"https://substack.com/@theologymade/note/c-238522947?utm_source=notes-share-action&r=868noo\" target=\"_blank\">Quelle</a>).",
      imprintTitle: "Impressum / Rechtliches",

      disclaimerTitle: "Haftungsausschluss",
      disclaimerText: "Diese App wird ohne Mängelgewähr, ausschließlich für pädagogische und kreative Zwecke und ohne jegliche Haftung bereitgestellt.<br><a href=\"https://www.crispstro.be\" target=\"_blank\">www.crispstro.be</a>"
    },
    theologians: {
      Augustine: { name:"Augustinus von Hippo", tradition:"Westlich / Katholisch", dates:"354 – 430 n. Chr.", traits:["Erbsünde","Göttliche Gnade","Gottesstaat","Bekenntnisse","Unruhiges Herz"], desc:"Du resonierst tief mit Augustinus — dem großen nordafrikanischen Bischof, dessen Leben ein Drama der Unruhe und Erlösung war. Wie Augustinus bist du dir tief bewusst, dass das menschliche Herz dazu neigt, umherzuirren, und du bist gleichermaßen überzeugt, dass nur Gott die Leere füllen kann. Du denkst in großen, umfassenden Kategorien: zwei Städte, zwei Lieben, zwei Bestimmungen. Theologie ist für dich nie nur akademisch — sie ist autobiografisch. Der Hunger nach Schönheit, Wahrheit und Ruhe in Gott ist der rote Faden alles dessen, was du glaubst." },
      Athanasius: { name:"Athanasius von Alexandria", tradition:"Östlich Orthodox", dates:"ca. 296 – 373 n. Chr.", traits:["Nizänische Orthodoxie","Theosis","Inkarnation","Contra Mundum","Trinität"], desc:"Du teilst die unerbittliche Überzeugung des Athanasius — des Bischofs, der contra mundum (gegen die Welt) stand, um die volle Gottheit Christi zu verteidigen, als fast alle anderen Kompromisse eingingen. Wie Athanasius glaubst du, dass die Inkarnation alles ist: Gott wurde wirklich Mensch, damit die Menschen wirklich am göttlichen Leben teilhaben können. Du hältst den Glauben unnachgiebig fest, nicht aus Sturheit, sondern weil du genau weißt, was auf dem Spiel steht, wenn die Kirche es falsch macht. Orthodoxie ist für dich keine technische Angelegenheit — sie ist der Unterschied zwischen Leben und Tod." },
      Aquinas: { name:"Thomas von Aquin", tradition:"Westlich / Katholisch", dates:"1225 – 1274 n. Chr.", traits:["Natürliches Gesetz","Glaube & Vernunft","Summa Theologiae","Fünf Wege","Scholastik"], desc:"Du trägst die Seele des Thomas von Aquin — des 'stummen Ochsen', dessen gewaltiger, geordneter Geist eine Kathedrale des Denkens aus Glauben und Vernunft errichtete. Wie Aquin glaubst du, dass Gnade die Natur vollendet, anstatt sie zu zerstören, dass Philosophie und Theologie Verbündete und keine Feinde sind, und dass Wahrheit, wo immer sie begegnet, letztlich Gott gehört. Du bist geduldig, systematisch und überzeugt, dass die Wirklichkeit zusammenhält — dass die geschöpfliche Welt sakramental ist und über sich selbst hinaus auf ihren Schöpfer verweist." },
      Anselm: { name:"Anselm von Canterbury", tradition:"Westlich / Katholisch", dates:"1033 – 1109 n. Chr.", traits:["Fides Quaerens Intellectum","Ontologisches Argument","Cur Deus Homo","Satisfaktionslehre","Scholastik"], desc:"Du denkst mit der leuchtenden Präzision des Anselm von Canterbury — des Vaters der Scholastik, dessen Motto fides quaerens intellectum war: Glaube, der Verständnis sucht. Wie Anselm begnügst du dich nicht damit, einfach zu glauben — du willst verstehen, was du glaubst, so tief, wie der Geist es erfassen kann. Du siehst keinen Widerspruch zwischen strenger Argumentation und glühendem Glauben. Dein berühmtes ontologisches Argument war kein kalter logischer Trick, sondern ein Akt des Gebets — ein Geist, der in Gott verliebt ist und nach Klarheit über denjenigen strebt, den er liebt." },
      Luther: { name:"Martin Luther", tradition:"Lutherisch / Protestantisch", dates:"1483 – 1546 n. Chr.", traits:["Sola Fide","Sola Scriptura","Rechtfertigung","Die Reformation","Gnade Allein"], desc:"Du trägst das Feuer Martin Luthers — des Augustiner-Mönchs, dessen qualvolle Suche nach einem gnädigen Gott die Reformation entfachte. Wie Luther bist du ergriffen von der radikalen Freiheit des Evangeliums: Wir werden durch Gnade allein, durch Glauben allein, in Christus allein gerechtfertigt. Die Schrift ist deine höchste Autorität. Du hast wenig Geduld für religiöse Systeme, die Gewissen mit dem belasten, was Gott bereits frei vollbracht hat. Wenn du für etwas einstehst, dann stehst du — und du bewegst dich nicht." },
      Calvin: { name:"Johannes Calvin", tradition:"Reformiert / Protestantisch", dates:"1509 – 1564 n. Chr.", traits:["Souveränität Gottes","Prädestination","TULIP","Sola Scriptura","Reformierte Theologie"], desc:"Du denkst mit der disziplinierten Klarheit Johannes Calvins — des Reformators von Genf, dessen Theologie mit der absoluten Souveränität Gottes beginnt und endet. Wie Calvin findest du Trost nicht in deiner eigenen Wahl Gottes, sondern in Gottes Wahl von dir. Die Schrift regiert das ganze Leben: Anbetung, Politik, Gemeinschaft und die individuelle Seele. Du bist angezogen von strenger Konsequenz und willst, dass deine Theologie nicht nur wahr, sondern total ist — ein Rahmen, um die gesamte Wirklichkeit unter der Herrschaft Christi zu sehen." },
      Chrysostom: { name:"Johannes Chrysostomus", tradition:"Östlich Orthodox", dates:"ca. 349 – 407 n. Chr.", traits:["Goldener Mund","Fürsorge für die Armen","Homiletik","Soziale Gerechtigkeit","Liturgie"], desc:"Du brennst mit der eloquenten Leidenschaft des Johannes Chrysostomus — des 'goldmundigen' Predigers von Antiochia und Konstantinopel, der erklärte, dass der Altar der Armen genauso heilig ist wie der Altar der Eucharistie. Wie Chrysostomus kannst du die Liebe zu Gott nicht von der konkreten Liebe zum Nächsten trennen. Du predigst mit Hitze und Klarheit, weigerst dich, die Mächtigen zu schmeicheln, und glaubst, dass die größte Prüfung der Kirche nicht ihre Lehre, sondern ihr Umgang mit den Hungrigen und Obdachlosen ist. Für dich endet Theologie immer auf der Straße." },
      Maximus: { name:"Maximus der Bekenner", tradition:"Östlich Orthodox", dates:"ca. 580 – 662 n. Chr.", traits:["Kosmische Christologie","Theosis","Logos & Logoi","Rekapitulierung","Göttliche Energien"], desc:"Du denkst mit der atemberaubenden kosmischen Vision des Maximus des Bekenners — des byzantinischen Theologen, der die ganze Schöpfung als ein riesiges Netz göttlicher Bedeutungen (logoi) sah, das im ewigen Logos zusammengehalten wird. Wie Maximus glaubst du, dass die gesamte geschöpfliche Ordnung sich auf ihre endgültige Darbringung an Gott in Liebe zubewegt. Christus ist nicht nur Erlöser, sondern die Achse, um die sich das Universum dreht. Du bist angezogen von Synthese: Natur und Gnade, Leib und Seele, Zeit und Ewigkeit — alles schließlich versöhnt und in ihm dargebracht. Du glaubst, dass Wahrheit es wert ist, für sie zu leiden, und du hast den Preis bezahlt." },
      Barth: { name:"Karl Barth", tradition:"Reformiert / Neo-Orthodox", dates:"1886 – 1968 n. Chr.", traits:["Neo-Orthodoxie","Wort Gottes","Christozentrismus","Kirchliche Dogmatik","Offenbarung"], desc:"Du denkst mit dem kühnen Christozentrismus von Karl Barth — des Schweizer Theologen, der ein donnerndes Nein zur liberalen Theologie sagte und die Kirche zurück zum fremden, souveränen Wort Gottes rief. Wie Barth glaubst du, dass Theologie mit Gottes Selbstoffenbarung in Jesus Christus beginnen muss — nicht mit menschlicher Erfahrung, Philosophie oder natürlicher Theologie. Jede theologische Frage führt zu ihm zurück. Du bist misstrauisch gegenüber Systemen, die den lebendigen Gott zähmen, und du glaubst, dass die Kirche das Wort in jedem Zeitalter neu hören muss." },
      Edwards: { name:"Jonathan Edwards", tradition:"Reformiert / Calvinistisch", dates:"1703 – 1758 n. Chr.", traits:["Religiöse Affekte","Erweckung","Schönheit Gottes","Souveränität","Great Awakening"], desc:"Du teilst die ehrfurchtsvolle Vision von Jonathan Edwards — des Theologen und Erweckungspredigers aus Neuengland, der Gottes Souveränität nicht als kalte Lehre, sondern als überwältigende, schreckliche Schönheit erlebte. Wie Edwards glaubst du, dass wahre Religion nicht nur intellektuelle Zustimmung ist, sondern eine Verwandlung der Affekte — ein neues Gefühl des Herzens, entzündet durch den Geist. Du hast ein scharfes Auge für die Herrlichkeit Gottes, die durch Natur und Schrift gleichermaßen scheint, und du weißt, dass echte Erweckung beginnt, wenn die Schönheit Gottes in das gewöhnliche Leben einbricht." },
      Wesley: { name:"John Wesley", tradition:"Methodistisch / Arminianisch", dates:"1703 – 1791 n. Chr.", traits:["Vollständige Heiligung","Vorhergehende Gnade","Methodistische Bewegung","Soziale Heiligkeit","Mittel der Gnade"], desc:"Du trägst den warmherzigen Glauben von John Wesley — des Oxford-Dozenten, dessen Herz 'seltsam erwärmt' wurde und der dann England mit dem Evangelium in Brand setzte. Wie Wesley glaubst du, dass Gnade echt für alle verfügbar ist, dass das christliche Leben eine Reise zur vollständigen Heiligung ist und dass persönliche Heiligkeit untrennbar von sozialer Heiligkeit ist. Du bist sowohl methodisch als auch leidenschaftlich — du glaubst an Mittel der Gnade, an kleine Gruppen, an Rechenschaftspflicht und daran, die Menschen zu erreichen, die die höfliche Religion zurückgelassen hat." },
      Lewis: { name:"C.S. Lewis", tradition:"Anglikanisch / Mere Christianity", dates:"1898 – 1963 n. Chr.", traits:["Apologetik","Mere Christianity","Vorstellungskraft","Freude","Vernunft & Glaube"], desc:"Du teilst den imaginativen Glauben von C.S. Lewis — des Oxford-Dozenten, dessen Weg vom Atheismus zum Christentum einige der beliebtesten Apologetiken des zwanzigsten Jahrhunderts hervorbrachte. Wie Lewis glaubst du, dass Vernunft und Vorstellungskraft beide Wege zur Wahrheit sind, dass Freude ein Hinweis ist, der über sich selbst hinaus auf Gott verweist, und dass die christliche Geschichte nicht nur wahr ist, sondern die schönste und kohärenteste Geschichte, die es gibt. Du liebst Ideen, du liebst Geschichten, und du glaubst, dass jemandem zu helfen, die Dinge klar zu sehen, eine tief spirituelle Tat sein kann." },
      Teresa: { name:"Teresa von Ávila", tradition:"Katholisch / Karmelitische Mystik", dates:"1515 – 1582 n. Chr.", traits:["Inneres Schloss","Kontemplatives Gebet","Mystik","Göttliche Vereinigung","Kirchenlehrerin"], desc:"Du wirst in die mystischen Tiefen der Teresa von Ávila gezogen — der spanischen Karmelitin und Kirchenlehrerin, deren 'Inneres Schloss' die Reise der Seele zur Vereinigung mit Gott kartografierte. Wie Teresa weißt du, dass Theologie letztlich von Begegnung handelt, nicht von Information. Gebet ist keine Pflicht, sondern eine Beziehung — manchmal schwierig, manchmal leuchtend, immer essenziell. Du hast ein tiefes Gefühl für die Würde der Seele und ihre Fähigkeit, durch die lebendige, inwohnende Gegenwart Gottes verwandelt zu werden." },
      Bonhoeffer: { name:"Dietrich Bonhoeffer", tradition:"Lutherisch / Bekennende Kirche", dates:"1906 – 1945 n. Chr.", traits:["Kostspielige Gnade","Nachfolge","Ethik","Widerstand","Gemeinsames Leben"], desc:"Du teilst den kostspieligen Glauben von Dietrich Bonhoeffer — des deutschen Theologen und Pastors, der von den Nazis hingerichtet wurde, weil er sich gegen Hitler stellte. Wie Bonhoeffer glaubst du, dass Gnade nicht billig ist — sie fordert alles. Die Kirche muss konkrete Gestalt in der Welt annehmen; sie kann sich nicht in Frömmigkeit zurückziehen, während der Nächste leidet. Theologie ist für dich immer auf dem Weg zur Tat. Du bist ergriffen von der Frage: Wie sieht es tatsächlich aus, Jesus nachzufolgen — nicht in der Theorie, sondern hier, jetzt, um jeden Preis?" },
    },
    questions: [
      { text: "Was ist die primäre Quelle der christlichen Wahrheit?", options: [

let current = 0;
let answers = [];
let lang = 'en';

function setLanguage(l) {
  lang = l;
  const d = data[lang];
  document.getElementById('pageTitle').innerText = d.title;
  document.getElementById('quizTitle').innerText = d.title;
  document.getElementById('quizSubtitle').innerText = d.subtitle;
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.getElementById('langDe').classList.toggle('active', lang === 'de');
  document.getElementById('labelScoring').innerText = d.showScoringLabel;
  
  const m = d.modal;
  document.getElementById('modalBody').innerHTML = `
    <h2>${m.title}</h2>
    <p>${m.p1}</p>
    <p>${m.p2}</p>
    <p>${m.p3}</p>
    <hr>
    <h3>${m.imprintTitle}</h3>
    <p>${m.serviceProvider}</p>
    <p>${m.contact}</p>
    <p>${m.responsible}</p>
    <p><strong>${m.disclaimerTitle}:</strong><br>${m.disclaimerText}</p>
  `;
  
  renderQuestion();
}

function toggleScoring(active) {
  document.getElementById('body').classList.toggle('scoring-active', active);
}

function getScores() {
  const scores = {};
  const theologiansList = Object.keys(data[lang].theologians);
  for (const k of theologiansList) scores[k] = 0;
  for (let i = 0; i < data[lang].questions.length; i++) {
    if (answers[i] === undefined || answers[i] === null) continue;
    const opt = data[lang].questions[i].options[answers[i]];
    for (const [k, v] of Object.entries(opt.scores)) {
      if (scores[k] !== undefined) scores[k] += v;
    }
  }
  return scores;
}

function renderQuestion() {
  const d = data[lang];
  const q = d.questions[current];
  const pct = Math.round((current / d.questions.length) * 100);
  const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N'];
  
  document.getElementById('quizArea').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>${d.questionLabel} ${current + 1} ${d.ofLabel} ${d.questions.length}</span>
        <span>${pct}% ${d.completeLabel}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-block">
      <div class="question-number">${d.questionLabel} ${current + 1}</div>
      <div class="question-text">${q.text}</div>
      <div class="options" id="opts">
        ${q.options.map((o,i) => {
          const scoreSummary = Object.entries(o.scores).map(([k,v])=>`${d.theologians[k].name} (+${v})`).join(', ');
          return `
          <div class="option ${answers[current]===i?'selected':''}" onclick="selectOption(${i})">
            <div class="opt-letter">${letters[i]}</div>
            <div class="opt-text">${o.text}</div>
            <div class="opt-info">
              <span class="info-icon">ℹ️</span>
              <div class="info-tooltip">${scoreSummary}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="nav">
        ${current > 0 ? `<button class="btn btn-secondary" onclick="goBack()">${d.backBtn}</button>` : ''}
        <button class="btn btn-primary" id="nextBtn" onclick="goNext()" ${answers[current]===undefined || answers[current]===null?'disabled':''}>
          ${current < d.questions.length-1 ? d.continueBtn : d.resultBtn}
        </button>
      </div>
    </div>`;
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el,idx) => el.classList.toggle('selected', idx===i));
  const btn = document.getElementById('nextBtn');
  if (btn) btn.disabled = false;
}

function goNext() {
  if (answers[current] === undefined || answers[current] === null) return;
  if (current < data[lang].questions.length-1) { current++; renderQuestion(); }
  else renderResult();
}
function goBack() { if (current > 0) { current--; renderQuestion(); } }

function renderResult() {
  const d = data[lang];
  const scores = getScores();
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const topKey = sorted[0][0];
  const maxPts = sorted[0][1];
  const t = d.theologians[topKey];

  const bars = sorted.map(([k,v],idx) => {
    const pct = maxPts > 0 ? Math.round((v/maxPts)*100) : 0;
    return `<div class="score-row">
      <div class="score-row-label"><span>${d.theologians[k].name}</span><span>${v} ${d.ptsLabel}</span></div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${idx===0?'is-top':''}" data-pct="${pct}" style="width:0%"></div>
      </div>
    </div>`;
  }).join('');

  const icons = { Augustine:"📜", Athanasius:"⛪", Aquinas:"⚖️", Anselm:"🔑", Luther:"🔥", Calvin:"🏛️", Chrysostom:"🗣️", Maximus:"✨", Barth:"📖", Edwards:"⚡", Wesley:"🕊️", Lewis:"🦁", Teresa:"🌹", Bonhoeffer:"✝️" };

  document.getElementById('quizArea').innerHTML = `
    <div class="result-block">
      <span class="result-icon">${icons[topKey]}</span>
      <div class="result-label">${d.resultLead}</div>
      <div class="result-name">${t.name}</div>
      <div class="result-tradition">${t.tradition}</div>
      <div class="result-dates">${t.dates}</div>
      <div class="result-divider"></div>
      <p class="result-desc">${t.desc}</p>
      <div class="result-traits">${t.traits.map(tr=>`<span class="trait">${tr}</span>`).join('')}</div>
      <div class="result-divider"></div>
      <div class="score-section-label">${d.affinityLabel}</div>
      <div class="score-chart">${bars}</div>
      <div class="nav" style="justify-content:center;margin-top:1.5rem;">
        <button class="btn btn-primary" onclick="restartQuiz()">${d.restartBtn}</button>
      </div>
    </div>`;

  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; });
  }, 100);
}

function restartQuiz() {
  current = 0;
  answers = [];
  renderQuestion();
}

// Modal Logic
const modal = document.getElementById("infoModal");
const infoBtn = document.getElementById("infoBtn");
const closeBtn = document.getElementById("closeModal");

infoBtn.onclick = function() { modal.style.display = "block"; }
closeBtn.onclick = function() { modal.style.display = "none"; }
window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

// Detect language from browser
const userLang = navigator.language || navigator.userLanguage;
if (userLang.startsWith('de')) lang = 'de';

setLanguage(lang);
</script>
</body>
</html>
