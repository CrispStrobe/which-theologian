  .opt-letter { flex-shrink:0; width:1.7rem; height:1.7rem; border:1px solid var(--sepia-light); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.65rem; color:var(--sepia); transition:all 0.2s; margin-top:0.05rem; }
  .opt-text { font-size:0.97rem; color:var(--ink); line-height:1.45; padding-top:0.1rem; flex-grow: 1; }
  .opt-info { margin-left: 0.5rem; position: relative; display: flex; align-items: center; visibility: hidden; }

  .info-tooltip { visibility: hidden; width: 180px; background-color: var(--parchment-dark); color: var(--ink); text-align: center; border: 1px solid var(--gold); border-radius: 2px; padding: 0.5rem; position: absolute; z-index: 10; bottom: 125%; right: 0; opacity: 0; transition: opacity 0.3s; font-size: 0.7rem; font-family: 'Georgia', serif; font-style: normal; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  .opt-info:hover .info-tooltip { visibility: visible; opacity: 1; }
  .nav { display:flex; justify-content:flex-end; margin-top:2.2rem; padding-top:1.5rem; border-top:1px solid rgba(122,92,58,0.2); gap:0.8rem; }
  .btn { font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; padding:0.65rem 1.6rem; border:1px solid var(--burgundy); cursor:pointer; transition:all 0.2s; border-radius:1px; }

  .result-name { font-family: 'Georgia', serif; font-style: italic; font-size:2.2rem; color:var(--burgundy); margin-bottom:0.3rem; line-height:1.1; }

  .result-dates { font-family: 'Georgia', serif; font-size:0.9rem; color:var(--sepia); font-style:italic; margin-bottom:1.2rem; }
  .result-divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:1.2rem auto; }
  .result-desc { font-size:1.03rem; color:#3a2210; line-height:1.78; text-align:left; margin-bottom:1.5rem; }
  .result-traits { display:flex; flex-wrap:wrap; gap:0.5rem; justify-content:center; margin-bottom:2rem; }
  .trait { font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.8rem; border:1px solid var(--gold); color:var(--sepia); border-radius:1px; }
  .score-section-label { font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:0.8rem; text-align:left; }
  .score-chart { margin:0.5rem 0 1.5rem; }

  .score-row-label { display:flex; justify-content:space-between; font-family: 'Georgia', serif; font-variant: small-caps; font-size:0.57rem; letter-spacing:0.07em; color:var(--sepia); text-transform:uppercase; margin-bottom:0.2rem; }
  .score-bar-track { height:5px; background:var(--parchment-dark); border-radius:2px; overflow:hidden; }
  .score-bar-fill { height:100%; background:linear-gradient(90deg,var(--burgundy),var(--gold-light)); border-radius:2px; transition:width 1s cubic-bezier(.4,0,.2,1); width:0; }
  .score-bar-fill.is-top { background:linear-gradient(90deg,var(--burgundy),var(--gold)); }
  @keyframes fadeUp    { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeDown  { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeRight { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  @media(max-width:520px){ 
    .card{padding:2rem 1.4rem;} 
    .quiz-header h1{font-size:1.3rem;}

    .scoring-toggle-container { bottom: 70px; right: 20px; }
  }
</style>

<script>
const data = {
  en: {
    title: "Which Theologian Are You?",
    subtitle: "Eighteen questions on grace, theosis, reason, faith & the soul's journey to God",
    questionLabel: "Question", ofLabel: "of", completeLabel: "complete", backBtn: "← Back", continueBtn: "Continue →", resultBtn: "See My Result", restartBtn: "Take the Quiz Again", resultLead: "You are most like", affinityLabel: "Your theological affinities", ptsLabel: "pts", showScoringLabel: "Show Scoring",
    modal: {
      title: "About this Quiz", p1: "This quiz originates from <strong>Jordan Vale</strong> (<a href=\"https://substack.com/@theologymade\" target=\"_blank\">Theology Made</a>).", p2: "Original Quiz: <a href=\"https://whichtheologianareyou.netlify.app\" target=\"_blank\">whichtheologianareyou.netlify.app</a>", p3: "The German translation is provided with courtesy (<a href=\"https://substack.com/@theologymade/note/c-238522947?utm_source=notes-share-action&r=868noo\" target=\"_blank\">source</a>).",
      imprintTitle: "Imprint / Legal", serviceProvider: "<strong>Service Provider:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany", contact: "<strong>Contact:</strong><br>Email: <a href=\"mailto:postmaster@crispstro.be\">postmaster@crispstro.be</a><br>Phone: 0049 176 6421 8601", responsible: "<strong>Responsible for Content:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany", disclaimerTitle: "Disclaimer", disclaimerText: "This app is provided as is, exclusively for educational and creative purposes, without any liability.<br><a href=\"https://www.crispstro.be\" target=\"_blank\">www.crispstro.be</a>"
    },
    theologians: {
      Augustine: { name:"Augustine of Hippo", tradition:"Western / Catholic", dates:"354 – 430 AD", traits:["Original Sin","Divine Grace","City of God","Confessions","Restless Heart"], desc:"You resonate deeply with Augustine — the great North African bishop whose life was a drama of restlessness and redemption. Like Augustine, you are profoundly aware of the human heart's tendency to wander, and equally convinced that only God can fill the void. You think in large, sweeping categories: two cities, two loves, two destinies. Theology, for you, is never merely academic — it is autobiographical. The hunger for beauty, truth, and rest in God is the through-line of everything you believe." },
      Athanasius: { name:"Athanasius of Alexandria", tradition:"Eastern Orthodox", dates:"c. 296 – 373 AD", traits:["Nicene Orthodoxy","Theosis","Incarnation","Contra Mundum","Trinity"], desc:"You share the unbending conviction of Athanasius — the bishop who stood contra mundum (against the world) to defend the full divinity of Christ when almost everyone else compromised. Like Athanasius, you believe the Incarnation is everything: God truly became human so that humans might truly share in divine life. You hold the faith tenaciously, not out of stubbornness, but because you know exactly what is at stake if the Church gets it wrong. Orthodoxy is not a technicality for you — it is the difference between life and death." },
      Aquinas: { name:"Thomas Aquinas", tradition:"Western / Catholic", dates:"1225 – 1274 AD", traits:["Natural Law","Faith & Reason","Summa Theologiae","Five Ways","Scholasticism"], desc:"You carry the soul of Thomas Aquinas — the 'Dumb Ox' whose vast, ordered mind built a cathedral of thought out of faith and reason. Like Aquinas, you believe that grace perfects nature rather than destroying it, that philosophy and theology are allies rather than enemies, and that truth encountered anywhere ultimately belongs to God. You are patient, systematic, and convinced that reality holds together — that the created world is sacramental, pointing beyond itself to its Maker." },
      Anselm: { name:"Anselm of Canterbury", tradition:"Western / Catholic", dates:"1033 – 1109 AD", traits:["Fides Quaerens Intellectum","Ontological Argument","Cur Deus Homo","Satisfaction Atonement","Scholasticism"], desc:"You think with the luminous precision of Anselm of Canterbury — the father of scholasticism whose motto was fides quaerens intellectum: faith seeking understanding. Like Anselm, you are not content merely to believe — you want to understand what you believe, as deeply as the mind can reach. You see no contradiction between rigorous argument and ardent faith. Your famous ontological argument was not a cold logical trick but an act of prayer — a mind in love with God, reaching for clarity about the One it loves." },
      Luther: { name:"Martin Luther", tradition:"Lutheran / Protestant", dates:"1483 – 1546 AD", traits:["Sola Fide","Sola Scriptura","Justification","The Reformation","Grace Alone"], desc:"You carry the fire of Martin Luther — the Augustinian monk whose anguished search for a gracious God sparked the Reformation. Like Luther, you are gripped by the radical freedom of the Gospel: we are justified by grace alone, through faith alone, in Christ alone. Scripture is your supreme authority. You have little patience for religious systems that burden consciences with what God has already accomplished freely. When you stand for something, you stand — and you do not move." },
      Calvin: { name:"John Calvin", tradition:"Reformed / Protestant", dates:"1509 – 1564 AD", traits:["Sovereignty of God","Predestination","TULIP","Sola Scriptura","Reformed Theology"], desc:"You think with the disciplined clarity of John Calvin — the reformer of Geneva whose theology begins and ends with the absolute sovereignty of God. Like Calvin, you find comfort not in your own choosing of God, but in God's choosing of you. Scripture governs all of life: worship, politics, community, and the individual soul. You are drawn to rigorous consistency, and you want your theology to be not just true but total — a framework for seeing all of reality under the lordship of Christ." },
      Chrysostom: { name:"John Chrysostom", tradition:"Eastern Orthodox", dates:"c. 349 – 407 AD", traits:["Golden Mouth","Care for the Poor","Homiletics","Social Justice","Liturgy"], desc:"You burn with the eloquent passion of John Chrysostom — the 'Golden-Mouthed' preacher of Antioch and Constantinople who declared that the altar of the poor is as sacred as the altar of the Eucharist. Like Chrysostom, you cannot separate love of God from concrete love of neighbor. You preach with heat and clarity, refuse to flatter the powerful, and believe the Church's greatest test is not its doctrine but its treatment of the hungry and the homeless. For you, theology always ends in the street." },
      Maximus: { name:"Maximus the Confessor", tradition:"Eastern Orthodox", dates:"c. 580 – 662 AD", traits:["Cosmic Christology","Theosis","Logos & Logoi","Recapitulation","Divine Energies"], desc:"You think with the breathtaking cosmic vision of Maximus the Confessor — the Byzantine theologian who saw all of creation as a vast web of divine meanings (logoi) held together in the eternal Logos. Like Maximus, you believe the whole created order is moving toward its final offering-up to God in love. Christ is not merely Savior but the very axis around which the universe turns. You are drawn to synthesis: nature and grace, body and soul, time and eternity — all things ultimately reconciled and offered up in him. You believe truth is worth suffering for, and you paid the price." },
      Barth: { name:"Karl Barth", tradition:"Reformed / Neo-Orthodox", dates:"1886 – 1968 AD", traits:["Neo-Orthodoxy","Word of God","Christocentrism","Church Dogmatics","Revelation"], desc:"You think with the bold Christocentrism of Karl Barth — the Swiss theologian who said a thundering No to liberal theology and called the church back to the strange, sovereign Word of God. Like Barth, you believe theology must begin with God's self-revelation in Jesus Christ — not human experience, philosophy, or natural theology. Every theological question leads back to him. You are suspicious of systems that tame the living God, and you believe the church must hear the Word afresh in every age." },
      Edwards: { name:"Jonathan Edwards", tradition:"Reformed / Calvinist", dates:"1703 – 1758 AD", traits:["Religious Affections","Revival","Beauty of God","Sovereignty","Great Awakening"], desc:"You share the awe-struck vision of Jonathan Edwards — the New England theologian and revivalist who experienced God's sovereignty not as cold doctrine but as overwhelming, terrible beauty. Like Edwards, you believe that true religion is not merely intellectual assent but a transformation of the affections — a new sense of the heart, enkindled by the Spirit. You have a keen eye for the glory of God shining through nature and Scripture alike, and you know that genuine revival begins when the beauty of God breaks into ordinary life." },
      Wesley: { name:"John Wesley", tradition:"Methodist / Arminian", dates:"1703 – 1791 AD", traits:["Entire Sanctification","Prevenient Grace","Methodist Movement","Social Holiness","Means of Grace"], desc:"You carry the warm-hearted faith of John Wesley — the Oxford don whose heart was 'strangely warmed' and who then set England ablaze with the Gospel. Like Wesley, you believe that grace is genuinely available to all, that the Christian life is a journey toward entire sanctification, and that personal holiness is inseparable from social holiness. You are both methodical and passionate — you believe in means of grace, in small groups, in accountability, and in reaching the people polite religion has left behind." },
      Lewis: { name:"C.S. Lewis", tradition:"Anglican / Mere Christianity", dates:"1898 – 1963 AD", traits:["Apologetics","Mere Christianity","Imagination","Joy","Reason & Faith"], desc:"You share the imaginative faith of C.S. Lewis — the Oxford don whose journey from atheism to Christianity produced some of the most beloved apologetics of the twentieth century. Like Lewis, you believe reason and imagination are both paths to truth, that Joy is a clue pointing beyond itself to God, and that the Christian story is not just true but the most beautiful and coherent story on offer. You love ideas, you love stories, and you believe that helping someone see things clearly can be a deeply spiritual act." },
      Teresa: { name:"Teresa of Ávila", tradition:"Catholic / Carmelite Mysticism", dates:"1515 – 1582 AD", traits:["Interior Castle","Contemplative Prayer","Mysticism","Divine Union","Doctor of the Church"], desc:"You are drawn into the mystical depths of Teresa of Ávila — the Spanish Carmelite reformer and Doctor of the Church whose Interior Castle mapped the soul's journey toward union with God. Like Teresa, you know that theology is ultimately about encounter, not information. Prayer is not a duty but a relationship — sometimes difficult, sometimes luminous, always essential. You have a profound sense of the soul's dignity and its capacity to be transformed by the living, indwelling presence of God." },
      Bonhoeffer: { name:"Dietrich Bonhoeffer", tradition:"Lutheran / Confessing Church", dates:"1906 – 1945 AD", traits:["Costly Grace","Discipleship","Ethics","Resistance","Life Together"], desc:"You share the costly faith of Dietrich Bonhoeffer — the German theologian and pastor executed by the Nazis for his resistance to Hitler. Like Bonhoeffer, you believe that grace is not cheap — it demands everything. The church must take concrete form in the world; it cannot retreat into piety while the neighbor suffers. Theology, for you, is always on the way to action. You are gripped by the question: what does it actually look like to follow Jesus — not in theory, but here, now, at whatever cost?" },
    },
    questions: [
      { text: "What is the primary source of Christian truth?", options: [ { text: "Scripture alone — the written Word is the supreme and final authority.", scores: {Luther:3,Calvin:2} }, { text: "Scripture and Holy Tradition together, faithfully held by the Church across the ages.", scores: {Athanasius:3,Chrysostom:2,Maximus:1} }, { text: "Scripture, tradition, and reason in harmony — each illuminating the others.", scores: {Aquinas:3,Lewis:2,Anselm:1} }, { text: "The living Word of God — Christ himself, speaking freshly in every generation.", scores: {Barth:3,Bonhoeffer:1} } ]},
      { text: "What is the ultimate goal of the Christian life?", options: [ { text: "Theosis — a genuine participation in the divine nature, transforming the whole person in Christ.", scores: {Maximus:3,Athanasius:2,Teresa:1} }, { text: "Entire sanctification — the heart wholly purified and filled with perfect love for God and neighbor.", scores: {Wesley:3} }, { text: "To glorify God and enjoy him forever — our chief end is his eternal praise.", scores: {Calvin:3,Edwards:2} }, { text: "To rest in God — our hearts are restless until they repose in him.", scores: {Augustine:3,Anselm:1} } ]},
      { text: "How do you think about salvation?", options: [ { text: "God sovereignly elects his own before the foundation of the world — salvation is entirely his work.", scores: {Calvin:3,Augustine:1,Edwards:1} }, { text: "Grace alone, through faith alone — justification is God's free declaration, not something earned.", scores: {Luther:3,Anselm:1} }, { text: "Prevenient grace reaches all; we freely respond to God's prior, pursuing love.", scores: {Wesley:3} }, { text: "A transformation of the entire person — body, soul, and will — into the likeness of Christ.", scores: {Maximus:3,Athanasius:2,Augustine:1} } ]},
      { text: "What role does human reason play in faith?", options: [ { text: "Faith seeking understanding — reason is the faithful handmaid of revealed truth.", scores: {Anselm:3,Aquinas:2} }, { text: "Reason and imagination together build a cumulative case for Christianity.", scores: {Lewis:3,Aquinas:1} }, { text: "Reason is deeply fallen; revelation alone can truly disclose who God is.", scores: {Barth:3,Luther:1} }, { text: "Reason illumines the natural order — but must be crowned and elevated by grace.", scores: {Aquinas:3,Maximus:1} } ]},
      { text: "How do you understand the Incarnation?", options: [ { text: "God became human so that humans might become partakers of the divine nature.", scores: {Athanasius:3,Maximus:2} }, { text: "The Word became flesh to satisfy the debt of sin and restore our honor before God.", scores: {Anselm:3,Luther:1} }, { text: "In Christ, God speaks his definitive Word — the Incarnation is the center of all theology.", scores: {Barth:3,Bonhoeffer:1} }, { text: "The Incarnation reveals the depth of God's love and the dignity of every human person.", scores: {Chrysostom:3,Lewis:1} } ]},
      { text: "Which image best captures the Christian life?", options: [ { text: "Pilgrims traveling through the City of Man toward the eternal City of God.", scores: {Augustine:3} }, { text: "A castle with many interior rooms — the soul journeying ever deeper toward union with God.", scores: {Teresa:3} }, { text: "A cosmic ascent — all of creation being gathered and lovingly offered back to its Creator.", scores: {Maximus:3,Athanasius:1} }, { text: "A courtroom — the guilty sinner declared righteous by the judge through faith alone.", scores: {Luther:3,Calvin:1} } ]},
      { text: "How do you engage with philosophy and the intellectual tradition?", options: [ { text: "I synthesize faith and philosophy into a grand unified vision of all reality.", scores: {Aquinas:3,Maximus:1} }, { text: "Philosophy is a useful sparring partner — I use it to defend and illuminate the faith.", scores: {Anselm:3,Lewis:2} }, { text: "I am deeply wary of philosophy; God's revelation in Christ judges all human wisdom.", scores: {Barth:3,Luther:1} }, { text: "The wisdom of the ancient world, rightly received, can be a servant of the Gospel.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "What is your view on grace?", options: [ { text: "Sovereign, irresistible, and particular — God unconditionally elects those he saves.", scores: {Calvin:3,Edwards:1} }, { text: "Freely given, utterly unmerited — it transforms the soul from within across a whole lifetime.", scores: {Augustine:3,Luther:1} }, { text: "The felt, empowering presence of the Holy Spirit — genuinely available to all who open themselves.", scores: {Wesley:3,Teresa:1} }, { text: "The very energies of God, communicated to the soul through prayer and the sacraments.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "What is the church's primary calling?", options: [ { text: "To preach the pure Word and rightly celebrate the sacraments — everything flows from that.", scores: {Luther:3,Calvin:1} }, { text: "To care for the poor, the widow, and the stranger — practical mercy is its heartbeat.", scores: {Chrysostom:3,Wesley:1,Bonhoeffer:1} }, { text: "To be a community of costly discipleship — the body of Christ taking form in the world.", scores: {Bonhoeffer:3} }, { text: "To worship God in the fullness of liturgy and sacrament, transmitting the faith whole and entire.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "How do you think about the poor and wealth?", options: [ { text: "The poor are the body of Christ — hoarding wealth while they suffer is a grave sin.", scores: {Chrysostom:3,Wesley:1} }, { text: "Stewardship of all we have must be rendered to God — we own nothing, we manage everything.", scores: {Calvin:3,Edwards:1} }, { text: "Love of neighbor means the whole of life — including economics — must be transformed.", scores: {Wesley:2,Bonhoeffer:2} }, { text: "Material goods are real but secondary — the soul's journey to God is what ultimately matters.", scores: {Teresa:3,Augustine:1} } ]},
      { text: "How do you describe prayer?", options: [ { text: "A deep, wordless communion — the soul stilled and receptive before the divine presence.", scores: {Teresa:3,Maximus:1} }, { text: "Passionate, Scripture-soaked conversation with a God who has made clear and binding promises.", scores: {Luther:3,Calvin:1} }, { text: "The heart's affections raised toward God — love is the truest language of prayer.", scores: {Edwards:3,Augustine:1} }, { text: "Liturgical, communal, and sacramental — the whole Body of Christ praying with one voice.", scores: {Chrysostom:3,Athanasius:1} } ]},
      { text: "Which aspect of Jesus grips you most?", options: [ { text: "His atoning sacrifice — the one who bore our sin and fully satisfied divine justice.", scores: {Anselm:3,Luther:2,Calvin:1} }, { text: "His resurrection — God's triumphant Yes over death and all the powers that oppose life.", scores: {Barth:3,Athanasius:2} }, { text: "His humanity and teaching — the Word made flesh, showing us how to live.", scores: {Lewis:3,Chrysostom:1} }, { text: "His cosmic lordship — the one in whom all things hold together and are finally recapitulated.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "How do you face seasons of doubt or spiritual dryness?", options: [ { text: "I build arguments — if God exists, what follows? Reason clears a great deal of fog.", scores: {Lewis:3,Anselm:2} }, { text: "I return to the Word and its promises — not my feelings, but what God has actually said.", scores: {Luther:3,Barth:1} }, { text: "I press through in contemplative prayer until the darkness gradually gives way to light.", scores: {Teresa:3,Maximus:1} }, { text: "Doubt calls me to action — faith is tested and purified in costly obedience.", scores: {Bonhoeffer:3,Wesley:1} } ]},
      { text: "What draws you most to theology?", options: [ { text: "A lifelong wrestling with sin, restlessness, and the deep hunger for God.", scores: {Augustine:3,Luther:1} }, { text: "A longing to know God — not merely to know about God.", scores: {Teresa:3,Edwards:2,Maximus:1} }, { text: "A desire to defend and articulate the faith once delivered to the saints.", scores: {Athanasius:3,Anselm:2} }, { text: "The overwhelming beauty and terror of God's sovereign majesty.", scores: {Edwards:3,Calvin:1} } ]},
      { text: "How should Christians engage the political world?", options: [ { text: "Two kingdoms — the church must not be captured by the state, nor simply abandon it.", scores: {Luther:3,Augustine:1} }, { text: "All of life falls under God's sovereignty — Scripture should shape all of society.", scores: {Calvin:3,Edwards:1} }, { text: "When the state becomes demonic, the church must resist — even at the cost of life itself.", scores: {Bonhoeffer:3} }, { text: "Justice for the poor is a political demand — the church must speak plainly for the vulnerable.", scores: {Chrysostom:3,Wesley:1} } ]},
      { text: "What is your view of the created world?", options: [ { text: "Creation is a gift whose deepest calling is to be offered back to God in love.", scores: {Maximus:3,Athanasius:1} }, { text: "Creation reflects eternal law and points, through reason, back to its Creator.", scores: {Aquinas:3,Lewis:1} }, { text: "Creation is fallen but redeemable — beauty remains, shot through with traces of God.", scores: {Augustine:3,Lewis:1} }, { text: "The world is a theatre of God's glory — his sovereignty is written into every corner of it.", scores: {Calvin:3,Edwards:2} } ]},
      { text: "Which theological question grips you most?", options: [ { text: "Why do we sin so persistently, and how can grace set us finally and truly free?", scores: {Augustine:3,Luther:1} }, { text: "How does all of creation find its unity, its meaning, and its end in the eternal Logos?", scores: {Maximus:3,Athanasius:1} }, { text: "What is the soul, and how does it ascend through prayer toward union with God?", scores: {Teresa:3,Augustine:1} }, { text: "What does the new birth feel like — and how does genuine holiness actually grow in us?", scores: {Wesley:3,Edwards:2} } ]},
      { text: "Which phrase resonates most with your theological heart?", options: [ { text: "\"Our heart is restless, until it rests in you.\" — Augustine", scores: {Augustine:3} }, { text: "\"He became man that we might become God.\" — Athanasius", scores: {Athanasius:3,Maximus:1} }, { text: "\"The Logos holds all things together — and draws all things home.\" — Maximus (paraphrase)", scores: {Maximus:3} }, { text: "\"Grace does not destroy nature, but perfects it.\" — Aquinas", scores: {Aquinas:3} }, { text: "\"Credo ut intelligam — I believe so that I may understand.\" — Anselm", scores: {Anselm:3} }, { text: "\"Here I stand. I can do no other.\" — Luther (traditional attribution)", scores: {Luther:3} }, { text: "\"We are not our own; we belong to God.\" — Calvin", scores: {Calvin:3} }, { text: "\"God's Word cannot be imprisoned — it must be heard anew in every generation.\" — Barth (paraphrase)", scores: {Barth:3} }, { text: "\"I believe in Christianity as I believe that the sun has risen: not only because I see it, but because by it I see everything else.\" — Lewis", scores: {Lewis:3} }, { text: "\"The soul in prayer is like one beginning to die to the world.\" — Teresa (paraphrase)", scores: {Teresa:3} }, { text: "\"Cheap grace is the deadly enemy of our church.\" — Bonhoeffer", scores: {Bonhoeffer:3} }, { text: "\"The wealth you keep is stolen from the poor.\" — Chrysostom", scores: {Chrysostom:3} }, { text: "\"True religion is nothing but the love of God and man.\" — Wesley (paraphrase)", scores: {Wesley:3} }, { text: "\"The heart has no rest until it trembles before the beauty of God.\" — Edwards (paraphrase)", scores: {Edwards:3} } ]}
    ]
  },
  de: {
    title: "Welcher Theologe bist du?",
    subtitle: "Achtzehn Fragen über Gnade, Theosis, Vernunft, Glauben und die Reise der Seele zu Gott",
    questionLabel: "Frage", ofLabel: "von", completeLabel: "abgeschlossen", backBtn: "← Zurück", continueBtn: "Weiter →", resultBtn: "Ergebnis anzeigen", restartBtn: "Quiz erneut durchführen", resultLead: "Du bist am ehesten wie", affinityLabel: "Deine theologischen Affinitäten", ptsLabel: "Pkt", showScoringLabel: "Punkte anzeigen",
    modal: {
      title: "Über dieses Quiz", p1: "Dieses Quiz stammt ursprünglich von <strong>Jordan Vale</strong> (<a href=\"https://substack.com/@theologymade\" target=\"_blank\">Theology Made</a>).", p2: "Original-Quiz: <a href=\"https://whichtheologianareyou.netlify.app\" target=\"_blank\">whichtheologianareyou.netlify.app</a>", p3: "Diese Version mit deutscher Übersetzung wird mit seiner freundlichen Zustimmung zur Verfügung gestellt (<a href=\"https://substack.com/@theologymade/note/c-238522947?utm_source=notes-share-action&r=868noo\" target=\"_blank\">Quelle</a>).",
      imprintTitle: "Impressum / Rechtliches", serviceProvider: "<strong>Diensteanbieter:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany", contact: "<strong>Kontakt:</strong><br>E-Mail: <a href=\"mailto:postmaster@crispstro.be\">postmaster@crispstro.be</a><br>Telefon: 0049 176 6421 8601", responsible: "<strong>Verantwortlich für den Inhalt:</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Deutschland/Germany", disclaimerTitle: "Haftungsausschluss", disclaimerText: "Diese App wird ohne Mängelgewähr, ausschließlich für pädagogische und kreative Zwecke und ohne jegliche Haftung bereitgestellt.<br><a href=\"https://www.crispstro.be\" target=\"_blank\">www.crispstro.be</a>"
    },
    theologians: {
      Augustine: { name:"Augustinus von Hippo", tradition:"Westlich / Katholisch", dates:"354 – 430 n. Chr.", traits:["Erbsünde","Göttliche Gnade","Gottesstaat","Bekenntnisse","Unruhiges Herz"], desc:"Du resonierst tief mit Augustinus — dem großen nordafrikanischen Bischof, dessen Leben ein Drama der Unruhe und Erlösung war. Wie Augustinus bist du dir tief bewusst, dass das menschliche Herz dazu neigt, umherzuirren, und du bist gleichermaßen überzeugt, dass nur Gott die Leere füllen kann. Du denkst in großen, umfassenden Kategorien: zwei Städte, zwei Lieben, zwei Bestimmungen. Theologie ist für dich nie nur akademisch — sie ist autobiografisch. Der Hunger nach Schönheit, Wahrheit und Ruhe in Gott ist der rote Faden alles dessen, was du glaubst." },
      Athanasius: { name:"Athanasius von Alexandria", tradition:"Östlich Orthodox", dates:"ca. 296 – 373 n. Chr.", traits:["Nizänische Orthodoxie","Theosis","Inkarnation","Contra Mundum","Trinität"], desc:"Du teilst die unerbittliche Überzeugung des Athanasius — des Bischofs, der contra mundum (gegen die Welt) stand, um die volle Gottheit Christi zu verteidigen, als fast alle anderen Kompromisse eingingen. Wie Athanasius glaubst du, dass die Inkarnation alles ist: Gott wurde wirklich Mensch, damit die Menschen wirklich am göttlichen Leben teilhaben können. Du hältst den Glauben unnachgiebig fest, nicht aus Sturheit, sondern weil du genau weißt, was auf dem Spiel steht, wenn die Kirche es falsch macht. Orthodoxie ist für dich keine technische Angelegenheit — sie ist der Unterschied zwischen Leben und Tod." },
      Aquinas: { name:"Thomas von Aquin", tradition:"Westlich / Katholisch", dates:"1225 – 1274 n. Chr.", traits:["Natürliches Gesetz","Glaube & Vernunft","Summa Theologiae","Fünf Wege","Scholastik"], desc:"Du trägst die Seele des Thomas von Aquin — des 'stummen Ochsen', dessen gewaltiger, geordneter Geist eine Kathedrale des Denkens aus Glauben und Vernunft errichtete. Wie Aquin glaubst du, dass Gnade die Natur vollendet, anstatt sie zu zerstören, dass Philosophie und Theologie Verbündete und keine Feinde sind, und dass Wahrheit, wo immer sie begegnet, letztlich Gott gehört. Du bist geduldig, systematisch und überzeugt, dass die Wirklichkeit zusammenhält — dass die geschöpfliche Welt sakramental ist und über sich selbst hinaus auf ihren Schöpfer verweist." },
      Anselm: { name:"Anselm von Canterbury", tradition:"Westlich / Katholisch", dates:"1033 – 1109 n. Chr.", traits:["Fides Quaerens Intellectum","Ontologisches Argument","Cur Deus Homo","Satisfaktionslehre","Scholastik"], desc:"Du denkst mit der leuchtenden Präzision des Anselm von Canterbury — des Vaters der Scholastik, dessen Motto fides quaerens intellectum war: Glaube, der Verständnis sucht. Wie Anselm begnügst du dich nicht damit, einfach zu glauben — du willst verstehen, was du glaubst, so tief, wie der Geist es erfassen kann. Du siehst keinen Widerspruch zwischen strenger Argumentation und glühendem Glauben. Dein berühmtes ontologisches Argument war kein kalter logischer Trick, sondern ein Akt des Gebets — ein Geist, der in Gott verliebt ist und nach Klarheit über denjenigen strebt, den er liebt." },
      Luther: { name:"Martin Luther", tradition:"Lutherisch / Protestantisch", dates:"1483 – 1546 n. Chr.", traits:["Sola Fide","Sola Scriptura","Rechtfertigung","Die Reformation","Gnade Allein"], desc:"Du trägst das Feuer Martin Luthers — des Augustiner-Mönchs, dessen qualvolle Suche nach einem gnädigen Gott die Reformation entfachte. Wie Luther bist du ergriffen von der radikalen Freiheit des Evangeliums: Wir werden durch Gnade allein, durch Glauben allein, in Christus allein gerechtfertigt. Die Schrift ist deine höchste Autorität. Du hast wenig Geduld für religiöse Systeme, die Gewissen mit dem belasten, was Gott bereits frei vollbracht hat. Wenn du für etwas einstehst, dann stehst du — und du bewegst dich nicht." },
      Calvin: { name:"Johannes Calvin", tradition:"Reformiert / Protestantisch", dates:"1509 – 1564 n. Chr.", traits:["Souveränität Gottes","Prädestination","TULIP","Sola Scriptura","Reformierte Theologie"], desc:"Du denkst mit der disziplinierten Klarheit Johannes Calvins — des Reformators von Genf, dessen Theologie mit der absoluten Souveränität Gottes beginnt und endet. Wie Calvin findest du Trost nicht in deiner eigenen Wahl Gottes, sondern in Gottes Wahl von dir. Die Schrift regiert das ganze Leben: Anbetung, Politik, Gemeinschaft und die individuelle Seele. Du bist angezogen von strenger Konsequenz und willst, dass deine Theologie nicht nur wahr, sondern total ist — ein Rahmen, um die gesamte Wirklichkeit unter der Herrschaft Christi zu sehen." },
      Chrysostom: { name:"Johannes Chrysostomus", tradition:"Östlich Orthodox", dates:"ca. 349 – 407 n. Chr.", traits:["Goldener Mund","Fürsorge für die Armen","Homiletik","Soziale Gerechtigkeit","Liturgie"], desc:"Du brennst mit der eloquenten Leidenschaft des Johannes Chrysostomus — des 'goldmundigen' Predigers von Antiochia und Konstantinopel, der erklärte, dass der Altar der Armen genauso heilig ist wie der Altar der Eucharistie. Wie Chrysostomus kannst du die Liebe zu Gott nicht von der konkreten Liebe zum Nächsten trennen. Du predigst mit Hitze und Klarheit, weigerst dich, die Mächtigen zu schmeicheln, und glaubst, dass die größte Prüfung der Kirche nicht ihre Lehre, sondern ihr Umgang mit den Hungrigen und Obdachlosen ist. Für dich endet Theologie immer auf der Straße." },
      Maximus: { name:"Maximus der Bekenner", tradition:"Östlich Orthodox", dates:"ca. 580 – 662 n. Chr.", traits:["Kosmische Christologie","Theosis","Logos & Logoi","Rekapitulierung","Göttliche Energien"], desc:"Du denkst mit der atemberaubenden kosmischen Vision des Maximus des Bekenners — des byzantinischen Theologen, der die ganze Schöpfung als ein riesiges Netz göttlicher Bedeutungen (logoi) sah, das im ewigen Logos zusammengehalten wird. Wie Maximus glaubst du, dass die gesamte geschöpfliche Ordnung sich auf ihre endgültige Darbringung an Gott in Liebe zubewegt. Christus ist nicht nur Erlöser, sondern die Achse, um die sich das Universum dreht. Du bist angezogen von Synthese: Natur und Gnade, Leib und Seele, Zeit und Ewigkeit — alles schließlich versöhnt und in ihm dargebracht. Du glaubst, dass Wahrheit es wert ist, für sie zu leiden, und du hast den Preis bezahlt." },
      Barth: { name:"Karl Barth", tradition:"Reformiert / Neo-Orthodox", dates:"1886 – 1968 n. Chr.", traits:["Neo-Orthodoxie","Wort Gottes","Christozentrismus","Kirchliche Dogmatik","Offenbarung"], desc:"Du denkst mit dem kühnen Christozentrismus von Karl Barth — des Schweizer Theologen, der ein donnerndes Nein zur liberalen Theologie sagte und die Kirche zurück zum fremden, souveränen Wort Gottes rief. Wie Barth glaubst du, dass Theologie mit Gottes Selbstoffenbarung in Jesus Christus beginnen muss — nicht mit menschlicher Erfahrung, Philosophie oder natürlicher Theologie. Jede theologische Frage führt zu ihm zurück. Du bist misstrauisch gegenüber Systemen, die den lebendigen Gott zähmen, und du glaubst, dass die Kirche das Wort in jedem Zeitalter neu hören muss." },
      Edwards: { name:"Jonathan Edwards", tradition:"Reformiert / Calvinistisch", dates:"1703 – 1758 n. Chr.", traits:["Religiöse Affekte","Erweckung","Schönheit Gottes","Souveränität","Great Awakening"], desc:"Du teilst die ehrfurchtsvolle Vision von Jonathan Edwards — des Theologen und Erweckungspredigers aus Neuengland, der Gottes Souveränität nicht als kalte Lehre, sondern als überwältigende, schreckliche Schönheit erlebte. Wie Edwards glaubst du, dass wahre Religion nicht nur intellektuelle Zustimmung ist, sondern eine Verwandlung der Affekte — ein neues Gefühl des Herzens, entzündet durch den Geist. Du hast ein scharfes Auge für die Herrlichkeit Gottes, die durch Natur und Schrift gleichermaßen scheint, und du weißt, dass echte Erweckung beginnt, wenn die Schönheit Gottes in das gewöhnliche Leben einbricht." },
      Wesley: { name:"John Wesley", tradition:"Methodistisch / Arminianisch", dates:"1703 – 1791 n. Chr.", traits:["Vollständige Heiligung","Vorhergehende Gnade","Methodistische Bewegung","Soziale Heiligkeit","Mittel der Gnade"], desc:"Du trägst den warmherzigen Glauben von John Wesley — des Oxford-Dozenten, dessen Herz 'seltsam erwärmt' wurde und der dann England mit dem Evangelium in Brand setzte. Wie Wesley glaubst du, dass Gnade echt für alle verfügbar ist, dass das christliche Leben eine Reise zur vollständigen Heiligung ist und dass persönliche Heiligkeit untrennbar von sozialer Heiligkeit ist. Du bist sowohl methodisch als auch leidenschaftlich — du glaubst an Mittel der Gnade, an kleine Gruppen, an Rechenschaftspflicht und daran, die Menschen zu erreichen, die die höfliche Religion zurückgelassen hat." },
      Lewis: { name:"C.S. Lewis", tradition:"Anglikanisch / Mere Christianity", dates:"1898 – 1963 n. Chr.", traits:["Apologetik","Mere Christianity","Vorstellungskraft","Freude","Vernunft & Glaube"], desc:"Du teilst den imaginativen Glauben von C.S. Lewis — des Oxford-Dozenten, dessen Weg vom Atheismus zum Christentum einige der beliebtesten Apologetiken des zwanzigsten Jahrhunderts hervorbrachte. Wie Lewis glaubst du, dass Vernunft und Vorstellungskraft beide Wege zur Wahrheit sind, dass Freude ein Hinweis ist, der über sich selbst hinaus auf Gott verweist, und dass die christliche Geschichte nicht nur wahr ist, sondern die schönste und kohärenteste Geschichte, die es gibt. Du liebst Ideen, du liebst Geschichten, und du glaubst, dass jemandem zu helfen, die Dinge klar zu sehen, eine tief spirituelle Tat sein kann." },
      Teresa: { name:"Teresa von Ávila", tradition:"Katholisch / Karmelitische Mystik", dates:"1515 – 1582 n. Chr.", traits:["Inneres Schloss","Kontemplatives Gebet","Mystik","Göttliche Vereinigung","Kirchenlehrerin"], desc:"Du wirst in die mystischen Tiefen der Teresa von Ávila gezogen — der spanischen Karmelitin und Kirchenlehrerin, deren 'Inneres Schloss' die Reise der Seele zur Vereinigung mit Gott kartografierte. Wie Teresa weißt du, dass Theologie letztlich von Begegnung handelt, nicht von Information. Gebet ist keine Pflicht, sondern eine Beziehung — manchmal schwierig, manchmal leuchtend, immer essenziell. Du hast ein tiefes Gefühl für die Würde der Seele und ihre Fähigkeit, durch die lebendige, inwohnende Gegenwart Gottes verwandelt zu werden." },
      Bonhoeffer: { name:"Dietrich Bonhoeffer", tradition:"Lutherisch / Bekennende Kirche", dates:"1906 – 1945 n. Chr.", traits:["Kostspielige Gnade","Nachfolge","Ethik","Widerstand","Gemeinsames Leben"], desc:"Du teilst den kostspieligen Glauben von Dietrich Bonhoeffer — des deutschen Theologen und Pastors, der von den Nazis hingerichtet wurde, weil er sich gegen Hitler stellte. Wie Bonhoeffer glaubst du, dass Gnade nicht billig ist — sie fordert alles. Die Kirche muss konkrete Gestalt in der Welt annehmen; sie kann sich nicht in Frömmigkeit zurückziehen, während der Nächste leidet. Theologie ist für dich immer auf dem Weg zur Tat. Du bist ergriffen von der Frage: Wie sieht es tatsächlich aus, Jesus nachzufolgen — nicht in der Theorie, sondern hier, jetzt, um jeden Preis?" },
    },
    questions: [
      { text: "Was ist die vorrangigste Quelle der christlichen Wahrheit?", options: [ { text: "Die Schrift allein — das geschriebene Wort ist die höchste und letzte Autorität.", scores: {Luther:3,Calvin:2} }, { text: "Schrift und Heilige Überlieferung zusammen, treu bewahrt von der Kirche durch die Jahrhunderte.", scores: {Athanasius:3,Chrysostom:2,Maximus:1} }, { text: "Schrift, Überlieferung und Vernunft in Harmonie — jede erhellt die anderen.", scores: {Aquinas:3,Lewis:2,Anselm:1} }, { text: "Das lebendige Wort Gottes — Christus selbst, der in jeder Generation neu spricht.", scores: {Barth:3,Bonhoeffer:1} } ]},
      { text: "Was ist das letztendliche Ziel des christlichen Lebens?", options: [ { text: "Theosis — eine echte Teilhabe an der göttlichen Natur, die den ganzen Menschen in Christus verwandelt.", scores: {Maximus:3,Athanasius:2,Teresa:1} }, { text: "Vollständige Heiligung — das Herz ganz gereinigt und erfüllt mit vollkommener Liebe zu Gott und dem Nächsten.", scores: {Wesley:3} }, { text: "Gott zu verherrlichen und ihn für immer zu genießen — unser höchstes Ziel ist sein ewiger Lobpreis.", scores: {Calvin:3,Edwards:2} }, { text: "In Gott zu ruhen — unser Herz ist unruhig, bis es in ihm Ruhe findet.", scores: {Augustine:3,Anselm:1} } ]},
      { text: "Wie denkst du über Erlösung?", options: [ { text: "Gott erwählt souverän die Seinen vor Grundlegung der Welt — die Erlösung ist ganz sein Werk.", scores: {Calvin:3,Augustine:1,Edwards:1} }, { text: "Gnade allein, durch Glauben allein — die Rechtfertigung ist Gottes freie Erklärung, nicht etwas Verdientes.", scores: {Luther:3,Anselm:1} }, { text: "Die vorangehende Gnade erreicht alle; wir antworten frei auf Gottes vorhergehende, verfolgende Liebe.", scores: {Wesley:3} }, { text: "Eine Verwandlung des ganzen Menschen — Leib, Seele und Wille — in das Bild Christi.", scores: {Maximus:3,Athanasius:2,Augustine:1} } ]},
      { text: "Welche Rolle spielt die menschliche Vernunft im Glauben?", options: [ { text: "Glaube, der Verständnis sucht — die Vernunft ist die treue Magd der offenbarten Wahrheit.", scores: {Anselm:3,Aquinas:2} }, { text: "Vernunft und Vorstellungskraft bauen gemeinsam einen kumulativen Fall für das Christentum auf.", scores: {Lewis:3,Aquinas:1} }, { text: "Die Vernunft ist tief gefallen; allein die Offenbarung kann wirklich zeigen, wer Gott ist.", scores: {Barth:3,Luther:1} }, { text: "Die Vernunft erhellt die natürliche Ordnung — aber sie muss von der Gnade gekrönt und erhoben werden.", scores: {Aquinas:3,Maximus:1} } ]},
      { text: "Wie verstehst du die Inkarnation?", options: [ { text: "Gott wurde Mensch, damit die Menschen Teilhaber der göttlichen Natur werden können.", scores: {Athanasius:3,Maximus:2} }, { text: "Das Wort wurde Fleisch, um die Schuld der Sünde zu tilgen und unsere Ehre vor Gott wiederherzustellen.", scores: {Anselm:3,Luther:1} }, { text: "In Christus spricht Gott sein definitives Wort — die Inkarnation ist das Zentrum aller Theologie.", scores: {Barth:3,Bonhoeffer:1} }, { text: "Die Inkarnation offenbart die Tiefe von Gottes Liebe und die Würde jedes Menschen.", scores: {Chrysostom:3,Lewis:1} } ]},
      { text: "Welches Bild erfasst das christliche Leben am besten?", options: [ { text: "Pilger, die durch die Stadt des Menschen zur ewigen Stadt Gottes reisen.", scores: {Augustine:3} }, { text: "Ein Schloss mit vielen Innenräumen — die Seele, die sich immer tiefer auf den Weg zur Vereinigung mit Gott macht.", scores: {Teresa:3} }, { text: "Ein kosmischer Aufstieg — die ganze Schöpfung wird liebevoll gesammelt und ihrem Schöpfer zurückgegeben.", scores: {Maximus:3,Athanasius:1} }, { text: "Ein Gerichtssaal — der schuldige Sünder wird durch den Glauben allein für gerecht erklärt.", scores: {Luther:3,Calvin:1} } ]},
      { text: "Wie gehst du mit Philosophie und der denkerischen Tradition um?", options: [ { text: "Ich synthetisiere Glauben und Philosophie zu einer großen, einheitlichen Vision der gesamten Wirklichkeit.", scores: {Aquinas:3,Maximus:1} }, { text: "Philosophie ist ein nützlicher Sparringspartner — ich nutze sie, um den Glauben zu verteidigen und zu erhellen.", scores: {Anselm:3,Lewis:2} }, { text: "Ich bin tief misstrauisch gegenüber Philosophie; Gottes Offenbarung in Christus richtet über alle menschliche Weisheit.", scores: {Barth:3,Luther:1} }, { text: "Die Weisheit der antiken Welt, richtig aufgenommen, kann eine Dienerin des Evangeliums sein.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "Was ist deine Ansicht über Gnade?", options: [ { text: "Souverän, unwiderstehlich und besonders — Gott erwählt bedingungslos diejenigen, die er rettet.", scores: {Calvin:3,Edwards:1} }, { text: "Frei gegeben, völlig unverdient — sie verwandelt die Seele von innen über ein ganzes Leben hinweg.", scores: {Augustine:3,Luther:1} }, { text: "Die gefühlte, ermächtigende Gegenwart des Heiligen Geistes — echt verfügbar für alle, die sich öffnen.", scores: {Wesley:3,Teresa:1} }, { text: "Die eigentlichen Energien Gottes, vermittelt an die Seele durch Gebet und die Sakramente.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "Was ist die primäre Berufung der Kirche?", options: [ { text: "Das reine Wort zu predigen und die Sakramente richtig zu feiern — alles fließt daraus.", scores: {Luther:3,Calvin:1} }, { text: "Für die Armen, die Witwen und die Fremden zu sorgen — praktische Barmherzigkeit ist ihr Herzschlag.", scores: {Chrysostom:3,Wesley:1,Bonhoeffer:1} }, { text: "Eine Gemeinschaft kostspieliger Nachfolge zu sein — der Leib Christi, der in der Welt Gestalt annimmt.", scores: {Bonhoeffer:3} }, { text: "Gott in der Fülle der Liturgie und der Sakramente anzubeten und den Glauben ganz und gar zu überliefern.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "Wie denkst du über die Armen und über Reichtum?", options: [ { text: "Die Armen sind der Leib Christi — Reichtum zu horten, während sie leiden, ist eine schwere Sünde.", scores: {Chrysostom:3,Wesley:1} }, { text: "Die Verwaltung alles dessen, was wir haben, muss Gott dargebracht werden — wir besitzen nichts, wir verwalten alles.", scores: {Calvin:3,Edwards:1} }, { text: "Die Liebe zum Nächsten bedeutet, dass das ganze Leben — einschließlich der Wirtschaft — verwandelt werden muss.", scores: {Wesley:2,Bonhoeffer:2} }, { text: "Materielle Güter sind real, aber sekundär — die Reise der Seele zu Gott ist letztlich das, was zählt.", scores: {Teresa:3,Augustine:1} } ]},
      { text: "Wie beschreibst du Gebet?", options: [ { text: "Eine tiefe, wortlose Gemeinschaft — die Seele, die vor der göttlichen Gegenwart still und empfänglich ist.", scores: {Teresa:3,Maximus:1} }, { text: "Leidenschaftliches, von der Schrift durchdrungenes Gespräch mit einem Gott, der klare und bindende Verheißungen gegeben hat.", scores: {Luther:3,Calvin:1} }, { text: "Die Zuneigungen des Herzens, die sich zu Gott erheben — die Liebe ist die wahrste Sprache des Gebets.", scores: {Edwards:3,Augustine:1} }, { text: "Liturgisch, gemeinschaftlich und sakramental — der ganze Leib Christi betet mit einer Stimme.", scores: {Chrysostom:3,Athanasius:1} } ]},
      { text: "Welcher Aspekt von Jesus ergreift dich am meisten?", options: [ { text: "Sein sühnendes Opfer — derjenige, der unsere Sünde trug und die göttliche Gerechtigkeit vollständig befriedigte.", scores: {Anselm:3,Luther:2,Calvin:1} }, { text: "Seine Auferstehung — Gottes triumphierendes Ja über den Tod und alle Mächte, die sich dem Leben widersetzen.", scores: {Barth:3,Athanasius:2} }, { text: "Seine Menschlichkeit und Lehre — das Wort, das Fleisch wurde und uns zeigt, wie wir leben sollen.", scores: {Lewis:3,Chrysostom:1} }, { text: "Seine kosmische Herrschaft — derjenige, in dem alles zusammenhält und schließlich rekapituliert wird.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "Wie gehst du mit Zeiten des Zweifels oder geistiger Trockenheit um?", options: [ { text: "Ich baue Argumente auf — wenn Gott existiert, was folgt daraus? Die Vernunft vertreibt viel Nebel.", scores: {Lewis:3,Anselm:2} }, { text: "Ich kehre zum Wort und seinen Verheißungen zurück — nicht zu meinen Gefühlen, sondern zu dem, was Gott tatsächlich gesagt hat.", scores: {Luther:3,Barth:1} }, { text: "Ich dränge mich durch im kontemplativen Gebet, bis die Dunkelheit allmählich dem Licht weicht.", scores: {Teresa:3,Maximus:1} }, { text: "Zweifel ruft mich zum Handeln — der Glaube wird im kostspieligen Gehorsam geprüft und geläutert.", scores: {Bonhoeffer:3,Wesley:1} } ]},
      { text: "Was zieht dich am meisten zur Theologie hin?", options: [ { text: "Ein lebenslanges Ringen mit Sünde, Unruhe und dem tiefen Hunger nach Gott.", scores: {Augustine:3,Luther:1} }, { text: "Ein Verlangen, Gott zu kennen — nicht nur über Gott Bescheid zu wissen.", scores: {Teresa:3,Edwards:2,Maximus:1} }, { text: "Ein Wunsch, den Glauben, der den Heiligen ein für alle Mal überliefert wurde, zu verteidigen und zu artikulieren.", scores: {Athanasius:3,Anselm:2} }, { text: "Die überwältigende Schönheit und das Entsetzen der souveränen Majestät Gottes.", scores: {Edwards:3,Calvin:1} } ]},
      { text: "Wie sollten Christen die politische Welt angehen?", options: [ { text: "Zwei Reiche — die Kirche darf nicht vom Staat vereinnahmt werden, noch darf sie ihn einfach verlassen.", scores: {Luther:3,Augustine:1} }, { text: "Das ganze Leben steht unter Gottes Souveränität — die Schrift sollte die gesamte Gesellschaft prägen.", scores: {Calvin:3,Edwards:1} }, { text: "Wenn der Staat dämonisch wird, muss die Kirche Widerstand leisten — selbst um den Preis des eigenen Lebens.", scores: {Bonhoeffer:3} }, { text: "Gerechtigkeit für die Armen ist eine politische Forderung — die Kirche muss klar für die Verwundbaren sprechen.", scores: {Chrysostom:3,Wesley:1} } ]},
      { text: "Was ist deine Sicht auf die geschöpfliche Welt?", options: [ { text: "Die Schöpfung ist ein Geschenk, dessen tiefster Ruf es ist, in Liebe an Gott zurückgegeben zu werden.", scores: {Maximus:3,Athanasius:1} }, { text: "Die Schöpfung spiegelt das ewige Gesetz wider und zeigt durch die Vernunft auf ihren Schöpfer zurück.", scores: {Aquinas:3,Lewis:1} }, { text: "Die Schöpfung ist gefallen, aber erlösbar — Schönheit bleibt, durchzogen von Spuren Gottes.", scores: {Augustine:3,Lewis:1} }, { text: "Die Welt ist ein Theater von Gottes Herrlichkeit — seine Souveränität ist in jede Ecke geschrieben.", scores: {Calvin:3,Edwards:2} } ]},
      { text: "Welche theologische Frage packt dich am meisten?", options: [ { text: "Warum sündigen wir so hartnäckig, und wie kann Gnade uns endlich und wahrhaftig frei setzen?", scores: {Augustine:3,Luther:1} }, { text: "Wie findet die ganze Schöpfung ihre Einheit, ihren Sinn und ihr Ende im ewigen Logos?", scores: {Maximus:3,Athanasius:1} }, { text: "Was ist die Seele, und wie steigt sie durch Gebet zur Vereinigung mit Gott auf?", scores: {Teresa:3,Augustine:1} }, { text: "Wie fühlt sich die Wiedergeburt an — und wie wächst echte Heiligkeit tatsächlich in uns?", scores: {Wesley:3,Edwards:2} } ]},
      { text: "Welcher Satz resoniert am meisten mit deinem theologischen Herzen?", options: [ { text: '\"Unser Herz ist unruhig, bis es in dir Ruhe findet.\" — Augustinus', scores: {Augustine:3} }, { text: '\"Er wurde Mensch, damit wir Gott werden.\" — Athanasius', scores: {Athanasius:3,Maximus:1} }, { text: '\"Der Logos hält alle Dinge zusammen — und zieht alle Dinge heim.\" — Maximus (Paraphrase)', scores: {Maximus:3} }, { text: '\"Gnade zerstört die Natur nicht, sondern vollendet sie.\" — Thomas von Aquin', scores: {Aquinas:3} }, { text: '\"Credo ut intelligam — Ich glaube, damit ich verstehe.\" — Anselm', scores: {Anselm:3} }, { text: '\"Hier stehe ich. Ich kann nicht anders.\" — Luther (traditionelle Zuschreibung)', scores: {Luther:3} }, { text: '\"Wir gehören nicht uns selbst; wir gehören Gott.\" — Calvin', scores: {Calvin:3} }, { text: '\"Gottes Wort kann nicht gefangen genommen werden — es muss in jeder Generation neu gehört werden.\" — Barth (Paraphrase)', scores: {Barth:3} }, { text: '\"Ich glaube an das Christentum, wie ich glaube, dass die Sonne aufgegangen ist: nicht nur, weil ich es sehe, sondern weil ich durch es alles andere sehe.\" — Lewis', scores: {Lewis:3} }, { text: '\"Die Seele im Gebet ist wie jemand, der beginnt, für die Welt zu sterben.\" — Teresa (Paraphrase)', scores: {Teresa:3} }, { text: '\"Billige Gnade ist der tödliche Feind unserer Kirche.\" — Bonhoeffer', scores: {Bonhoeffer:3} }, { text: '\"Der Reichtum, den du behältst, ist den Armen gestohlen.\" — Chrysostomus', scores: {Chrysostom:3} }, { text: '\"Wahre Religion ist nichts anderes als die Liebe zu Gott und zum Menschen.\" — Wesley (Paraphrase)', scores: {Wesley:3} }, { text: '\"Das Herz hat keine Ruhe, bis es vor der Schönheit Gottes erzittert.\" — Edwards (Paraphrase)', scores: {Edwards:3} } ]}
    ]
  },
  fr: {
    title: "Quel théologien êtes-vous ?", subtitle: "Dix-huit questions sur la grâce, la théosis, la raison, la foi et le voyage de l'âme vers Dieu",
    questionLabel: "Question", ofLabel: "sur", completeLabel: "terminé", backBtn: "← Retour", continueBtn: "Continuer →", resultBtn: "Voir mon résultat", restartBtn: "Recommencer le quiz", resultLead: "Vous ressemblez le plus à", affinityLabel: "Vos affinités théologiques", ptsLabel: "pts", showScoringLabel: "Afficher les points",
    modal: {
      title: "À propos de ce quiz", p1: "Ce quiz provient de <strong>Jordan Vale</strong> (<a href=\"https://substack.com/@theologymade\" target=\"_blank\">Theology Made</a>).", p2: "Quiz original : <a href=\"https://whichtheologianareyou.netlify.app\" target=\"_blank\">whichtheologianareyou.netlify.app</a>", p3: "La traduction est fournie avec l'aimable autorisation de Jordan Vale.",
      imprintTitle: "Mentions légales", serviceProvider: "<strong>Prestataire :</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Allemagne", contact: "<strong>Contact :</strong><br>Email : <a href=\"mailto:postmaster@crispstro.be\">postmaster@crispstro.be</a><br>Tél : 0049 176 6421 8601", responsible: "<strong>Responsable du contenu :</strong><br>Christian Ströbele<br>Nikolausstr. 5<br>70190 Stuttgart<br>Allemagne", disclaimerTitle: "Clause de non-responsabilité", disclaimerText: "Cette application est fournie en l'état, exclusivement à des fins éducatives et créatives, sans aucune responsabilité.<br><a href=\"https://www.crispstro.be\" target=\"_blank\">www.crispstro.be</a>"
    },
    theologians: {
      Augustine: { name: "Augustin d'Hippone", tradition: "Occidentale / Catholique", dates: "354 – 430 apr. J.-C.", traits: ["Péché originel", "Grâce divine", "Cité de Dieu", "Confessions", "Cœur inquiet"], desc: "Vous résonnez profondément avec Augustin — le grand évêque d'Afrique du Nord dont la vie fut un drame d'inquiétude et de rédemption. Comme Augustin, vous êtes profondément conscient de la tendance du cœur humain à l'errance, et également convaincu que seul Dieu peut combler le vide. Vous pensez par grandes catégories : deux cités, deux amours, deux destinées. La théologie, pour vous, n'est jamais purement académique — elle est autobiographique. La soif de beauté, de vérité et de repos en Dieu est le fil conducteur de tout ce que vous croyez." },
      Athanasius: { name: "Athanase d'Alexandrie", tradition: "Orthodoxe orientale", dates: "c. 296 – 373 apr. J.-C.", traits: ["Orthodoxie nicéenne", "Théosis", "Incarnation", "Contra Mundum", "Trinité"], desc: "Vous partagez la conviction inébranlable d'Athanase — l'évêque qui s'est tenu contra mundum (contre le monde) pour défendre la pleine divinité du Christ alors que presque tout le monde faisait des compromis. Comme Athanase, vous croyez que l'Incarnation est tout : Dieu s'est vraiment fait homme pour que les humains puissent vraiment partager la vie divine. Vous tenez à la foi avec ténacité, non par entêtement, mais parce que vous savez exactement ce qui est en jeu si l'Église se trompe. L'orthodoxie n'est pas une technicité pour vous — c'est la différence entre la vie et la mort." },
      Aquinas: { name: "Thomas d'Aquin", tradition: "Occidentale / Catholique", dates: "1225 – 1274 apr. J.-C.", traits: ["Loi naturelle", "Foi et Raison", "Somme théologique", "Cinq Voies", "Scolastique"], desc: "Vous portez l'âme de Thomas d'Aquin — le 'Bœuf Muet' dont l'esprit vaste et ordonné a construit une cathédrale de pensée à partir de la foi et de la raison. Comme l'Aquinat, vous croyez que la grâce perfectionne la nature plutôt que de la détruire, que la philosophie et la théologie sont des alliées plutôt que des ennemies, et que la vérité rencontrée n'importe où appartient ultimement à Dieu. Vous êtes patient, systématique et convaincu que la réalité forme un tout — que le monde créé est sacramentel, pointant au-delà de lui-même vers son Créateur." },
      Anselm: { name: "Anselme de Cantorbéry", tradition: "Occidentale / Catholique", dates: "1033 – 1109 apr. J.-C.", traits: ["Fides Quaerens Intellectum", "Argument ontologique", "Cur Deus Homo", "Rédemption par satisfaction", "Scolastique"], desc: "Vous pensez avec la précision lumineuse d'Anselme de Cantorbéry — le père de la scolastique dont la devise était fides quaerens intellectum : la foi en quête d'intelligence. Comme Anselme, vous ne vous contentez pas de croire — vous voulez comprendre ce que vous croyez, aussi profondément que l'esprit peut l'atteindre. Vous ne voyez aucune contradiction entre l'argumentation rigoureuse et la foi ardente. Votre célèbre argument ontologique n'était pas un froid tour de logique mais un acte de prière — un esprit amoureux de Dieu, cherchant la clarté sur Celui qu'il aime." },
      Luther: { name: "Martin Luther", tradition: "Luthérienne / Protestante", dates: "1483 – 1546 apr. J.-C.", traits: ["Sola Fide", "Sola Scriptura", "Justification", "La Réforme", "La Grâce seule"], desc: "Vous portez le feu de Martin Luther — le moine augustin dont la quête angoissée d'un Dieu gracieux a déclenché la Réforme. Comme Luther, vous êtes saisi par la liberté radicale de l'Évangile : nous sommes justifiés par la grâce seule, par la foi seule, en Christ seul. L'Écriture est votre autorité suprême. Vous avez peu de patience pour les systèmes religieux qui accablent les consciences avec ce que Dieu a déjà accompli gratuitement. Quand vous prenez position pour quelque chose, vous restez ferme — et vous ne bougez pas." },
      Calvin: { name: "Jean Calvin", tradition: "Réformée / Protestante", dates: "1509 – 1564 apr. J.-C.", traits: ["Souveraineté de Dieu", "Prédestination", "TULIP", "Sola Scriptura", "Théologie réformée"], desc: "Vous pensez avec la clarté disciplinée de Jean Calvin — le réformateur de Genève dont la théologie commence et finit avec la souveraineté absolue de Dieu. Comme Calvin, vous trouvez du réconfort non pas dans votre propre choix de Dieu, mais dans le choix que Dieu a fait de vous. L'Écriture régit toute la vie : le culte, la politique, la communauté et l'âme individuelle. Vous êtes attiré par une cohérence rigoureuse, et vous voulez que votre théologie soit non seulement vraie mais totale — un cadre pour voir toute la réalité sous la seigneurie du Christ." },
      Chrysostom: { name: "Jean Chrysostome", tradition: "Orthodoxe orientale", dates: "c. 349 – 407 apr. J.-C.", traits: ["Bouche d'Or", "Soin des pauvres", "Homilétique", "Justice sociale", "Liturgie"], desc: "Vous brûlez de la passion éloquente de Jean Chrysostome — le prédicateur à la 'Bouche d'Or' d'Antioche et de Constantinople qui déclarait que l'autel des pauvres est aussi sacré que l'autel de l'Eucharistie. Comme Chrysostome, vous ne pouvez séparer l'amour de Dieu de l'amour concret du prochain. Vous prêchez avec chaleur et clarté, refusez de flatter les puissants, et croyez que le plus grand test de l'Église n'est pas sa doctrine mais son traitement des affamés et des sans-abri. Pour vous, la théologie finit toujours dans la rue." },
      Maximus: { name: "Maxime le Confesseur", tradition: "Orthodoxe orientale", dates: "c. 580 – 662 apr. J.-C.", traits: ["Christologie cosmique", "Théosis", "Logos et Logoi", "Récapitulation", "Énergies divines"], desc: "Vous pensez avec la vision cosmique époustouflante de Maxime le Confesseur — le théologien byzantin qui voyait toute la création comme un vaste réseau de significations divines (logoi) maintenues ensemble dans le Logos éternel. Comme Maxime, vous croyez que tout l'ordre créé se dirige vers son offrande finale à Dieu dans l'amour. Le Christ n'est pas seulement Sauveur mais l'axe même autour duquel l'univers tourne. Vous êtes attiré par la synthèse : nature et grâce, corps et âme, temps et éternité — toutes choses finalement réconciliées et offertes en lui. Vous croyez que la vérité vaut la peine de souffrir, et vous en avez payé le prix." },
      Barth: { name: "Karl Barth", tradition: "Réformée / Néo-orthodoxe", dates: "1886 – 1968 apr. J.-C.", traits: ["Néo-orthodoxie", "Parole de Dieu", "Christocentrisme", "Dogmatique de l'Église", "Révélation"], desc: "Vous pensez avec le christocentrisme audacieux de Karl Barth — le théologien suisse qui a dit un 'Non' tonitruant à la théologie libérale et a rappelé l'Église à la Parole de Dieu étrange et souveraine. Comme Barth, vous croyez que la théologie doit commencer par l'auto-révélation de Dieu en Jésus-Christ — pas par l'expérience humaine, la philosophie ou la théologie naturelle. Chaque question théologique ramène à lui. Vous vous méfiez des systèmes qui apprivoisent le Dieu vivant, et vous croyez que l'Église doit entendre la Parole à nouveau à chaque époque." },
      Edwards: { name: "Jonathan Edwards", tradition: "Réformée / Calviniste", dates: "1703 – 1758 apr. J.-C.", traits: ["Affections religieuses", "Réveil", "Beauté de Dieu", "Souveraineté", "Grand Réveil"], desc: "Vous partagez la vision émerveillée de Jonathan Edwards — le théologien et revivaliste de la Nouvelle-Angleterre qui a expérimenté la souveraineté de Dieu non pas comme une doctrine froide mais comme une beauté écrasante et terrible. Comme Edwards, vous croyez que la vraie religion n'est pas seulement un assentiment intellectuel mais une transformation des affections — un nouveau sens du cœur, allumé par l'Esprit. Vous avez un œil aiguisé pour la gloire de Dieu brillant à travers la nature et l'Écriture, et vous savez que le véritable réveil commence quand la beauté de Dieu fait irruption dans la vie ordinaire." },
      Wesley: { name: "John Wesley", tradition: "Méthodiste / Armininienne", dates: "1703 – 1791 apr. J.-C.", traits: ["Sanctification entière", "Grâce prévenante", "Mouvement méthodiste", "Sainteté sociale", "Moyens de grâce"], desc: "Vous portez la foi chaleureuse de John Wesley — le professeur d'Oxford dont le cœur a été 'étrangement réchauffé' et qui a ensuite enflammé l'Angleterre avec l'Évangile. Comme Wesley, vous croyez que la grâce est véritablement disponible pour tous, que la vie chrétienne est un voyage vers la sanctification entière, et que la sainteté personnelle est inséparable de la sainteté sociale. Vous êtes à la fois méthodique et passionné — vous croyez aux moyens de grâce, aux petits groupes, à la redevabilité et à l'aide aux personnes que la religion polie a délaissées." },
      Lewis: { name: "C.S. Lewis", tradition: "Anglicane / Simple Christianisme", dates: "1898 – 1963 apr. J.-C.", traits: ["Apologétique", "Simple Christianisme", "Imagination", "Joie", "Raison et Foi"], desc: "Vous partagez la foi imaginative de C.S. Lewis — le professeur d'Oxford dont le chemin de l'athéisme au christianisme a produit certaines des apologétiques les plus aimées du XXe siècle. Comme Lewis, vous croyez que la raison et l'imagination sont toutes deux des chemins vers la vérité, que la Joie est un indice pointant au-delà d'elle-même vers Dieu, et que l'histoire chrétienne n'est pas seulement vraie mais la plus belle et la plus cohérente qui soit. Vous aimez les idées, vous aimez les histoires, et vous croyez qu'aider quelqu'un à voir les choses clairement peut être un acte profondément spirituel." },
      Teresa: { name: "Thérèse d'Avila", tradition: "Catholique / Mystique carmélitaine", dates: "1515 – 1582 apr. J.-C.", traits: ["Le Château intérieur", "Prière contemplative", "Mysticisme", "Union divine", "Docteur de l'Église"], desc: "Vous êtes attiré par les profondeurs mystiques de Thérèse d'Avila — la réformatrice carmélite espagnole et Docteur de l'Église dont 'Le Château intérieur' a cartographié le voyage de l'âme vers l'union avec Dieu. Comme Thérèse, vous savez que la théologie est ultimement une question de rencontre, pas d'information. La prière n'est pas un devoir mais une relation — parfois difficile, parfois lumineuse, toujours essentielle. Vous avez un sens profond de la dignité de l'âme et de sa capacité à être transformée par la présence vivante de Dieu en elle." },
      Bonhoeffer: { name: "Dietrich Bonhoeffer", tradition: "Luthérienne / Église confessante", dates: "1906 – 1945 apr. J.-C.", traits: ["Grâce coûteuse", "Discipleship", "Éthique", "Résistance", "Vie ensemble"], desc: "Vous partagez la foi coûteuse de Dietrich Bonhoeffer — le théologien et pasteur allemand exécuté par les nazis pour sa résistance à Hitler. Comme Bonhoeffer, vous croyez que la grâce n'est pas bon marché — elle exige tout. L'Église doit prendre une forme concrète dans le monde ; elle ne peut se retirer dans la piété pendant que le prochain souffre. La théologie, pour vous, est toujours sur le chemin de l'action. Vous êtes saisi par la question : à quoi ressemble concrètement le fait de suivre Jésus — pas en théorie, mais ici, maintenant, quel qu'en soit le prix ?" },
    },
    questions: [
      { text: "Quelle est la source primaire de la vérité chrétienne ?", options: [ { text: "L'Écriture seule — la Parole écrite est l'autorité suprême et finale.", scores: {Luther:3,Calvin:2} }, { text: "L'Écriture et la Sainte Tradition ensemble, fidèlement gardées par l'Église à travers les âges.", scores: {Athanasius:3,Chrysostom:2,Maximus:1} }, { text: "L'Écriture, la tradition et la raison en harmonie — chacune éclairant les autres.", scores: {Aquinas:3,Lewis:2,Anselm:1} }, { text: "La Parole vivante de Dieu — le Christ lui-même, parlant à chaque génération.", scores: {Barth:3,Bonhoeffer:1} } ]},
      { text: "Quel est le but ultime de la vie chrétienne ?", options: [ { text: "La Théosis — une véritable participation à la nature divine, transformant toute la personne en Christ.", scores: {Maximus:3,Athanasius:2,Teresa:1} }, { text: "La sanctification entière — le cœur totalement purifié et rempli d'un amour parfait pour Dieu et le prochain.", scores: {Wesley:3} }, { text: "Glorifier Dieu et se réjouir en lui pour toujours — notre fin principale est sa louange éternelle.", scores: {Calvin:3,Edwards:2} }, { text: "Reposer en Dieu — nos cœurs sont sans repos tant qu'ils ne reposent pas en lui.", scores: {Augustine:3,Anselm:1} } ]},
      { text: "Comment concevez-vous le salut ?", options: [ { text: "Dieu élit souverainement les siens avant la fondation du monde — le salut est entièrement son œuvre.", scores: {Calvin:3,Augustine:1,Edwards:1} }, { text: "La grâce seule, par la foi seule — la justification est la libre déclaration de Dieu, pas quelque chose de mérité.", scores: {Luther:3,Anselm:1} }, { text: "La grâce prévenante atteint tout le monde ; nous répondons librement à l'amour précurseur de Dieu.", scores: {Wesley:3} }, { text: "Une transformation de toute la personne — corps, âme et volonté — à la ressemblance du Christ.", scores: {Maximus:3,Athanasius:2,Augustine:1} } ]},
      { text: "Quel rôle la raison humaine joue-t-elle dans la foi ?", options: [ { text: "La foi en quête d'intelligence — la raison est la fidèle servante de la vérité révélée.", scores: {Anselm:3,Aquinas:2} }, { text: "La raison et l'imagination construisent ensemble un argument cumulatif pour le christianisme.", scores: {Lewis:3,Aquinas:1} }, { text: "La raison est profondément déchue ; seule la révélation peut vraiment faire connaître qui est Dieu.", scores: {Barth:3,Luther:1} }, { text: "La raison éclaire l'ordre naturel — mais doit être couronnée et élevée par la grâce.", scores: {Aquinas:3,Maximus:1} } ]},
      { text: "Comment comprenez-vous l'Incarnation ?", options: [ { text: "Dieu est devenu humain pour que les humains puissent devenir participants de la nature divine.", scores: {Athanasius:3,Maximus:2} }, { text: "Le Verbe s'est fait chair pour satisfaire la dette du péché et restaurer notre honneur devant Dieu.", scores: {Anselm:3,Luther:1} }, { text: "En Christ, Dieu prononce sa Parole définitive — l'Incarnation est le centre de toute théologie.", scores: {Barth:3,Bonhoeffer:1} }, { text: "L'Incarnation révèle la profondeur de l'amour de Dieu et la dignité de chaque personne humaine.", scores: {Chrysostom:3,Lewis:1} } ]},
      { text: "Quelle image capture le mieux la vie chrétienne ?", options: [ { text: "Des pèlerins voyageant à travers la Cité des Hommes vers la Cité de Dieu éternelle.", scores: {Augustine:3} }, { text: "Un château avec de nombreuses demeures intérieures — l'âme voyageant vers l'union avec Dieu.", scores: {Teresa:3} }, { text: "Une ascension cosmique — toute la création étant rassemblée et offerte à son Créateur.", scores: {Maximus:3,Athanasius:1} }, { text: "Un tribunal — le pécheur coupable déclaré juste par le juge par la foi seule.", scores: {Luther:3,Calvin:1} } ]},
      { text: "Comment interagissez-vous avec la philosophie et la tradition intellectuelle ?", options: [ { text: "Je synthétise la foi et la philosophie en une grande vision unifiée de toute la réalité.", scores: {Aquinas:3,Maximus:1} }, { text: "La philosophie est un partenaire utile — je l'utilise pour défendre et éclairer la foi.", scores: {Anselm:3,Lewis:2} }, { text: "Je me méfie profondément de la philosophie ; la révélation de Dieu en Christ juge toute sagesse humaine.", scores: {Barth:3,Luther:1} }, { text: "La sagesse du monde antique, correctement reçue, peut être une servante de l'Évangile.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "Quelle est votre vision de la grâce ?", options: [ { text: "Souveraine, irrésistible et particulière — Dieu élit inconditionnellement ceux qu'il sauve.", scores: {Calvin:3,Edwards:1} }, { text: "Donnée gratuitement, totalement imméritée — elle transforme l'âme de l'intérieur sur toute une vie.", scores: {Augustine:3,Luther:1} }, { text: "La présence ressentie et fortifiante du Saint-Esprit — réellement disponible pour tous ceux qui s'ouvrent.", scores: {Wesley:3,Teresa:1} }, { text: "Les énergies mêmes de Dieu, communiquées à l'âme par la prière et les sacrements.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "Quelle est la vocation primaire de l'Église ?", options: [ { text: "Prêcher la Parole pure et célébrer correctement les sacrements — tout découle de cela.", scores: {Luther:3,Calvin:1} }, { text: "Prendre soin des pauvres, de la veuve et de l'étranger — la miséricorde pratique est son cœur.", scores: {Chrysostom:3,Wesley:1,Bonhoeffer:1} }, { text: "Être une communauté de discipulat exigeant — le corps du Christ prenant forme dans le monde.", scores: {Bonhoeffer:3} }, { text: "Adorer Dieu dans la plénitude de la liturgie, transmettant la foi entière.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "Que pensez-vous des pauvres et de la richesse ?", options: [ { text: "Les pauvres sont le corps du Christ — accumuler des richesses pendant qu'ils souffrent est un péché grave.", scores: {Chrysostom:3,Wesley:1} }, { text: "La gérance de tout ce que nous avons doit être rendue à Dieu — nous ne possédons rien.", scores: {Calvin:3,Edwards:1} }, { text: "L'amour du prochain signifie que toute la vie — y compris l'économie — doit être transformée.", scores: {Wesley:2,Bonhoeffer:2} }, { text: "Les biens matériels sont réels mais secondaires — le voyage de l'âme vers Dieu est ce qui compte.", scores: {Teresa:3,Augustine:1} } ]},
      { text: "Comment décrivez-vous la prière ?", options: [ { text: "Une communion profonde et sans paroles — l'âme apaisée et réceptive devant la présence divine.", scores: {Teresa:3,Maximus:1} }, { text: "Une conversation passionnée avec un Dieu qui a fait des promesses claires et contraignantes.", scores: {Luther:3,Calvin:1} }, { text: "Les affections du cœur élevées vers Dieu — l'amour est le langage le plus vrai de la prière.", scores: {Edwards:3,Augustine:1} }, { text: "Liturgique, communautaire et sacramentelle — tout le Corps du Christ priant d'une seule voix.", scores: {Chrysostom:3,Athanasius:1} } ]},
      { text: "Quel aspect de Jésus vous touche le plus ?", options: [ { text: "Son sacrifice expiatoire — celui qui a porté notre péché et satisfait la justice divine.", scores: {Anselm:3,Luther:2,Calvin:1} }, { text: "Sa résurrection — le 'Oui' triomphant de Dieu sur la mort et toutes les puissances opposées.", scores: {Barth:3,Athanasius:2} }, { text: "Son humanité et son enseignement — le Verbe fait chair, nous montrant comment vivre.", scores: {Lewis:3,Chrysostom:1} }, { text: "Sa seigneurie cosmique — celui en qui toutes choses tiennent ensemble.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "Comment affrontez-vous les périodes de doute ou de sécheresse spirituelle ?", options: [ { text: "Je construis des arguments — si Dieu existe, qu'est-ce qui suit ? La raison dissipe le brouillard.", scores: {Lewis:3,Anselm:2} }, { text: "Je reviens à la Parole et à ses promesses — pas mes sentiments, mais ce que Dieu a dit.", scores: {Luther:3,Barth:1} }, { text: "Je persévère dans la prière contemplative jusqu'à ce que les ténèbres cèdent à la lumière.", scores: {Teresa:3,Maximus:1} }, { text: "Le doute m'appelle à l'action — la foi est testée et purifiée dans l'obéissance coûteuse.", scores: {Bonhoeffer:3,Wesley:1} } ]},
      { text: "Qu'est-ce qui vous attire le plus dans la théologie ?", options: [ { text: "Une lutte de toute une vie avec le péché, l'inquiétude et la faim profonde de Dieu.", scores: {Augustine:3,Luther:1} }, { text: "Un désir de connaître Dieu — et pas seulement de savoir des choses sur Dieu.", scores: {Teresa:3,Edwards:2,Maximus:1} }, { text: "Un désir de défendre et d'articuler la foi transmise aux saints une fois pour toutes.", scores: {Athanasius:3,Anselm:2} }, { text: "La beauté écrasante et la terreur de la majesté souveraine de Dieu.", scores: {Edwards:3,Calvin:1} } ]},
      { text: "Comment les chrétiens devraient-ils s'engager dans le monde politique ?", options: [ { text: "Deux royaumes — l'Église ne doit pas être capturée par l'État, ni simplement l'abandonner.", scores: {Luther:3,Augustine:1} }, { text: "Toute la vie tombe sous la souveraineté de Dieu — l'Écriture devrait façonner la société.", scores: {Calvin:3,Edwards:1} }, { text: "Quand l'État devient démoniaque, l'Église doit résister — même au prix de la vie.", scores: {Bonhoeffer:3} }, { text: "La justice pour les pauvres est une exigence politique — l'Église doit parler clairement.", scores: {Chrysostom:3,Wesley:1} } ]},
      { text: "Quelle est votre vision du monde créé ?", options: [ { text: "La création est un don dont la vocation profonde est d'être offerte à Dieu dans l'amour.", scores: {Maximus:3,Athanasius:1} }, { text: "La création reflète la loi éternelle et pointe, par la raison, vers son Créateur.", scores: {Aquinas:3,Lewis:1} }, { text: "La création est déchue mais rachetable — la beauté subsiste, traversée de traces de Dieu.", scores: {Augustine:3,Lewis:1} }, { text: "Le monde est un théâtre de la gloire de Dieu — sa souveraineté y est inscrite partout.", scores: {Calvin:3,Edwards:2} } ]},
      { text: "Quelle question théologique vous passionne le plus ?", options: [ { text: "Pourquoi péchons-nous si obstinément, et comment la grâce peut-elle nous libérer ?", scores: {Augustine:3,Luther:1} }, { text: "Comment toute la création trouve-t-elle son unité et sa fin dans le Logos éternel ?", scores: {Maximus:3,Athanasius:1} }, { text: "Qu'est-ce que l'âme, et comment s'élève-t-elle vers l'union avec Dieu ?", scores: {Teresa:3,Augustine:1} }, { text: "À quoi ressemble la nouvelle naissance — et comment la sainteté grandit-elle en nous ?", scores: {Wesley:3,Edwards:2} } ]},
      { text: "Quelle phrase résonne le plus avec votre cœur théologique ?", options: [ { text: "\"Notre cœur est sans repos, tant qu'il ne repose en toi.\" — Augustin", scores: {Augustine:3} }, { text: "\"Il est devenu homme pour que nous devenions Dieu.\" — Athanase", scores: {Athanasius:3,Maximus:1} }, { text: "\"Le Logos maintient toutes choses ensemble — et les ramène à la maison.\" — Maxime", scores: {Maximus:3} }, { text: "\"La grâce ne détruit pas la nature, mais la perfectionne.\" — Thomas d'Aquin", scores: {Aquinas:3} }, { text: "\"Credo ut intelligam — Je crois pour comprendre.\" — Anselme", scores: {Anselm:3} }, { text: "\"C'est ici que je me tiens. Je ne puis faire autrement.\" — Luther", scores: {Luther:3} }, { text: "\"Nous ne nous appartenons pas ; nous appartenons à Dieu.\" — Calvin", scores: {Calvin:3} }, { text: "\"La Parole de Dieu ne peut être emprisonnée — elle doit être entendue à nouveau.\" — Barth", scores: {Barth:3} }, { text: "\"Je crois au christianisme comme au soleil levé : car par lui je vois tout le reste.\" — Lewis", scores: {Lewis:3} }, { text: "\"L'âme en prière est comme quelqu'un qui commence à mourir au monde.\" — Thérèse", scores: {Teresa:3} }, { text: "\"La grâce à bon marché est l'ennemi mortel de notre Église.\" — Bonhoeffer", scores: {Bonhoeffer:3} }, { text: "\"La richesse que vous gardez est volée aux pauvres.\" — Chrysostome", scores: {Chrysostom:3} }, { text: "\"La vraie religion n'est rien d'autre que l'amour de Dieu et de l'homme.\" — Wesley", scores: {Wesley:3} }, { text: "\"Le cœur n'a point de repos tant qu'il ne tremble devant la beauté de Dieu.\" — Edwards", scores: {Edwards:3} } ]}
    ]
  },
