    },
    theologians: {
      Augustine: { name: "Agustín de Hipona", tradition: "Occidental / Católica", dates: "354 – 430 d. C.", traits: ["Pecado original", "Gracia divina", "Ciudad de Dios", "Confesiones", "Corazón inquieto"], desc: "Resuenas profundamente con Agustín, el gran obispo del norte de África cuya vida fue un drama de inquietud y redención. Al igual que Agustín, eres profundamente consciente de la tendencia del corazón humano a vagar, e igualmente convencido de que solo Dios puede llenar el vacío. Piensas en categorías amplias: dos ciudades, dos amores, dos destinos. La teología, para ti, nunca es meramente académica: es autobiográfica." },
      Athanasius: { name: "Atanasio de Alejandría", tradition: "Ortodoxa Oriental", dates: "c. 296 – 373 d. C.", traits: ["Ortodoxia Nicena", "Teosis", "Encarnación", "Contra Mundum", "Trinidad"], desc: "Compartes la convicción inquebrantable de Atanasio, el obispo que se mantuvo contra mundum (contra el mundo) para defender la plena divinidad de Cristo. Al igual que Atanasio, crees que la Encarnación lo es todo: Dios se hizo verdaderamente humano para que los humanos pudieran compartir verdaderamente la vida divina. Mantienes la fe con tenacidad porque sabes exactamente lo que está en juego si la Iglesia se equivoca." },
      Aquinas: { name: "Tomás de Aquino", tradition: "Occidental / Católica", dates: "1225 – 1274 d. C.", traits: ["Ley Natural", "Fe y Razón", "Suma Teológica", "Cinco Vías", "Escolástica"], desc: "Llevas el alma de Tomás de Aquino, el 'Buey Mudo' cuya mente vasta y ordenada construyó una catedral de pensamiento a partir de la fe y la razón. Al igual que Aquino, crees que la gracia perfecciona la naturaleza en lugar de destruirla, que la filosofía y la teología son aliadas y que la verdad encontrada en cualquier lugar pertenece en última instancia a Dios." },
      Anselm: { name: "Anselmo de Canterbury", tradition: "Occidental / Católica", dates: "1033 – 1109 d. C.", traits: ["Fides Quaerens Intellectum", "Argumento ontológico", "Cur Deus Homo", "Expiación por satisfacción", "Escolástica"], desc: "Piensas con la precisión luminosa de Anselmo de Canterbury, el padre de la escolástica cuyo lema era fides quaerens intellectum: la fe que busca el entendimiento. Al igual que Anselmo, no te conformas con creer: quieres entender lo que crees, tan profundamente como la mente pueda alcanzar. No ves contradicción entre el argumento riguroso y la fe ardiente." },
      Luther: { name: "Martín Lutero", tradition: "Luterana / Protestante", dates: "1483 – 1546 d. C.", traits: ["Sola Fide", "Sola Scriptura", "Justificación", "La Reforma", "Solo Gracia"], desc: "Llevas el fuego de Martín Lutero, el monje agustino cuya búsqueda angustiada de un Dios gracioso provocó la Reforma. Al igual que Lutero, te cautiva la libertad radical del Evangelio: somos justificados solo por la gracia, solo por la fe, solo en Cristo. La Escritura es tu autoridad suprema. Tienes poca paciencia con los sistemas religiosos que cargan las conciencias." },
      Calvin: { name: "Juan Calvino", tradition: "Reformada / Protestante", dates: "1509 – 1564 d. C.", traits: ["Soberanía de Dios", "Predestinación", "TULIP", "Sola Scriptura", "Teología Reformada"], desc: "Piensas con la claridad disciplinada de Juan Calvino, el reformador de Ginebra cuya teología comienza y termina con la soberanía absoluta de Dios. Al igual que Calvino, encuentras consuelo no en tu propia elección de Dios, sino en la elección que Dios hizo de ti. La Escritura gobierna toda la vida: el culto, la política, la comunidad y el alma individual." },
      Chrysostom: { name: "Juan Crisóstomo", tradition: "Ortodoxa Oriental", dates: "c. 349 – 407 d. C.", traits: ["Boca de Oro", "Cuidado de los pobres", "Homilética", "Justicia Social", "Liturgia"], desc: "Ardes con la pasión elocuente de Juan Crisóstomo, el predicador de 'Boca de Oro' que declaró que el altar de los pobres es tan sagrado como el altar de la Eucaristía. Al igual que Crisóstomo, no puedes separar el amor de Dios del amor concreto al prójimo. Predicas con calor y claridad, y crees que la prueba más grande de la Iglesia es su trato a los hambrientos." },
      Maximus: { name: "Máximo el Confesor", tradition: "Ortodoxa Oriental", dates: "c. 580 – 662 d. C.", traits: ["Cristología cósmica", "Teosis", "Logos y Logoi", "Recapitulación", "Energías divinas"], desc: "Piensas con la impresionante visión cósmica de Máximo el Confesor, el teólogo bizantino que vio toda la creación como una vasta red de significados divinos (logoi) mantenidos en el Logos eterno. Al igual que Máximo, crees que todo el orden creado se mueve hacia su ofrenda final a Dios en amor. Cristo es el eje mismo alrededor del cual gira el universo." },
      Barth: { name: "Karl Barth", tradition: "Reformada / Neo-ortodoxa", dates: "1886 – 1968 d. C.", traits: ["Neo-ortodoxia", "Palabra de Dios", "Cristocentrismo", "Dogmática Eclesial", "Revelación"], desc: "Piensas con el audaz cristocentrismo de Karl Barth, el teólogo suizo que dijo un rotundo 'No' a la teología liberal y llamó a la iglesia de vuelta a la extraña y soberana Palabra de Dios. Al igual que Barth, crees que la teología debe comenzar con la autorrevelación de Dios en Jesucristo, no con la experiencia humana o la filosofía." },
      Edwards: { name: "Jonathan Edwards", tradition: "Reformada / Calvinista", dates: "1703 – 1758 d. C.", traits: ["Afectos religiosos", "Avivamiento", "Belleza de Dios", "Soberanía", "Gran Despertar"], desc: "Compartes la visión asombrada de Jonathan Edwards, el teólogo de Nueva Inglaterra que experimentó la soberanía de Dios no como una doctrina fría sino como una belleza abrumadora. Al igual que Edwards, crees que la verdadera religión no es solo asentimiento intelectual sino una transformación de los afectos, un nuevo sentido del corazón encendido por el Espíritu." },
      Wesley: { name: "John Wesley", tradition: "Metodista / Arminiana", dates: "1703 – 1791 d. C.", traits: ["Entera Santificación", "Gracia Preveniente", "Movimiento Metodista", "Santidad Social", "Medios de Gracia"], desc: "Llevas la fe calurosa de John Wesley, el profesor de Oxford cuyo corazón fue 'extrañamente calentado' y que luego encendió a Inglaterra con el Evangelio. Al igual que Wesley, crees que la gracia está disponible para todos, que la vida cristiana es un viaje hacia la entera santificación y que la santidad personal es inseparable de la santidad social." },
      Lewis: { name: "C.S. Lewis", tradition: "Anglicana / Mero Cristianismo", dates: "1898 – 1963 d. C.", traits: ["Apologética", "Mero Cristianismo", "Imaginación", "Gozo", "Razón y Fe"], desc: "Compartes la fe imaginativa de C.S. Lewis, el profesor de Oxford cuyo viaje del ateísmo al cristianismo produjo algunas de las apologéticas más queridas del siglo XX. Al igual que Lewis, crees que la razón y la imaginación son caminos hacia la verdad, que el Gozo es una pista que apunta hacia Dios y que la historia cristiana es la más coherente que existe." },
      Teresa: { name: "Teresa de Ávila", tradition: "Católica / Mística carmelitana", dates: "1515 – 1582 d. C.", traits: ["El Castillo Interior", "Oración contemplativa", "Misticismo", "Unión Divina", "Doctora de la Iglesia"], desc: "Te sientes atraído por las profundidades místicas de Teresa de Ávila, la reformadora carmelita española que trazó el viaje del alma hacia la unión con Dios. Al igual que Teresa, sabes que la teología trata en última instancia de encuentros, no de información. La oración no es un deber sino una relación, siempre esencial. Tienes un profundo sentido de la dignidad del alma." },
      Bonhoeffer: { name: "Dietrich Bonhoeffer", tradition: "Luterana / Iglesia Confesante", dates: "1906 – 1945 d. C.", traits: ["Gracia Costosa", "Discipulado", "Ética", "Resistencia", "Vida en Comunidad"], desc: "Compartes la fe costosa de Dietrich Bonhoeffer, el teólogo alemán ejecutado por los nazis por su resistencia a Hitler. Al igual que Bonhoeffer, crees que la gracia no es barata: lo exige todo. La iglesia debe tomar forma concreta en el mundo; no puede retirarse a la piedad mientras el prójimo sufre. La teología para ti siempre está en camino a la acción." },
    },
    questions: [
      { text: "¿Cuál es la fuente primaria de la verdad cristiana?", options: [ { text: "Solo la Escritura: la Palabra escrita es la autoridad suprema y final.", scores: {Luther:3,Calvin:2} }, { text: "La Escritura y la Santa Tradición juntas, mantenidas fielmente por la Iglesia.", scores: {Athanasius:3,Chrysostom:2,Maximus:1} }, { text: "Escritura, tradición y razón en armonía, iluminándose mutuamente.", scores: {Aquinas:3,Lewis:2,Anselm:1} }, { text: "La Palabra viva de Dios: Cristo mismo, hablando a cada generación.", scores: {Barth:3,Bonhoeffer:1} } ]},
      { text: "¿Cuál es el objetivo final de la vida cristiana?", options: [ { text: "Teosis: una participación genuina en la naturaleza divina, transformando a la persona en Cristo.", scores: {Maximus:3,Athanasius:2,Teresa:1} }, { text: "Entera santificación: el corazón purificado y lleno de amor perfecto por Dios y el prójimo.", scores: {Wesley:3} }, { text: "Glorificar a Dios y gozar de Él para siempre: nuestro fin principal es su alabanza.", scores: {Calvin:3,Edwards:2} }, { text: "Descansar en Dios: nuestros corazones están inquietos hasta que reposan en Él.", scores: {Augustine:3,Anselm:1} } ]},
      { text: "¿Cómo piensas sobre la salvación?", options: [ { text: "Dios elige soberanamente a los suyos antes de la fundación del mundo: la salvación es obra suya.", scores: {Calvin:3,Augustine:1,Edwards:1} }, { text: "Solo por gracia, solo por fe: la justificación es la declaración gratuita de Dios.", scores: {Luther:3,Anselm:1} }, { text: "La gracia preveniente llega a todos; respondemos libremente al amor previo de Dios.", scores: {Wesley:3} }, { text: "Una transformación de toda la persona —cuerpo, alma y voluntad— a la semejanza de Cristo.", scores: {Maximus:3,Athanasius:2,Augustine:1} } ]},
      { text: "¿Qué papel juega la razón humana en la fe?", options: [ { text: "La fe que busca el entendimiento: la razón es la fiel servidora de la verdad revelada.", scores: {Anselm:3,Aquinas:2} }, { text: "La razón y la imaginación juntas construyen un argumento acumulativo para el cristianismo.", scores: {Lewis:3,Aquinas:1} }, { text: "La razón está profundamente caída; solo la revelación puede dar a conocer quién es Dios.", scores: {Barth:3,Luther:1} }, { text: "La razón ilumina el orden natural, pero debe ser coronada y elevada por la gracia.", scores: {Aquinas:3,Maximus:1} } ]},
      { text: "¿Cómo entiendes la Encarnación?", options: [ { text: "Dios se hizo humano para que los humanos pudieran participar de la naturaleza divina.", scores: {Athanasius:3,Maximus:2} }, { text: "El Verbe se hizo carne para satisfacer la deuda del pecado y restaurar nuestro honor ante Dios.", scores: {Anselm:3,Luther:1} }, { text: "En Cristo, Dios pronuncia su Palabra definitiva: la Encarnación es el centro de la teología.", scores: {Barth:3,Bonhoeffer:1} }, { text: "La Encarnación revela la profundidad del amor de Dios y la dignidad de cada persona.", scores: {Chrysostom:3,Lewis:1} } ]},
      { text: "¿Qué imagen captura mejor la vida cristiana?", options: [ { text: "Peregrinos viajando a través de la Ciudad del Hombre hacia la Ciudad de Dios eterna.", scores: {Augustine:3} }, { text: "Un castillo con muchas moradas interiores: el alma viajando hacia la unión con Dios.", scores: {Teresa:3} }, { text: "Un ascenso cósmico: toda la creación siendo reunida y ofrecida a su Creador.", scores: {Maximus:3,Athanasius:1} }, { text: "Un tribunal: el pecador culpable declarado justo por el juez solo por la fe.", scores: {Luther:3,Calvin:1} } ]},
      { text: "¿Cómo te relacionas con la filosofía y la tradición intelectual?", options: [ { text: "Sintetizo la fe y la filosofía en una gran visión unificada de toda la realidad.", scores: {Aquinas:3,Maximus:1} }, { text: "La filosofía es un compañero útil: la uso para defender e iluminar la fe.", scores: {Anselm:3,Lewis:2} }, { text: "Recelo de la filosofía; la revelación de Dios en Cristo juzga toda sabiduría humana.", scores: {Barth:3,Luther:1} }, { text: "La sabiduría del mundo antiguo, bien recibida, puede ser servidora del Evangelio.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "¿Cuál es tu visión sobre la gracia?", options: [ { text: "Soberana, irresistible y particular: Dios elige incondicionalmente a quienes salva.", scores: {Calvin:3,Edwards:1} }, { text: "Dada gratuitamente, totalmente inmerecida: transforma el alma desde dentro.", scores: {Augustine:3,Luther:1} }, { text: "La presencia empoderadora del Espíritu Santo, realmente disponible para todos.", scores: {Wesley:3,Teresa:1} }, { text: "Las energías mismas de Dios, comunicadas al alma mediante la oración y los sacramentos.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "¿Cuál es la vocación primordial de la iglesia?", options: [ { text: "Predicar la Palabra pura y celebrar los sacramentos: todo fluye de ahí.", scores: {Luther:3,Calvin:1} }, { text: "Cuidar de los pobres, la viuda y el extranjero: la misericordia es su latido.", scores: {Chrysostom:3,Wesley:1,Bonhoeffer:1} }, { text: "Ser una comunidad de discipulado costoso: el cuerpo de Cristo tomando forma en el mundo.", scores: {Bonhoeffer:3} }, { text: "Adorar a Dios en la plenitud de la liturgia, transmitiendo la fe íntegra.", scores: {Athanasius:2,Maximus:2,Chrysostom:1} } ]},
      { text: "¿Cómo piensas sobre los pobres y la riqueza?", options: [ { text: "Los pobres son el cuerpo de Cristo: acumular riqueza mientras sufren es un pecado grave.", scores: {Chrysostom:3,Wesley:1} }, { text: "La mayordomía de todo lo que tenemos debe rendirse a Dios: no poseemos nada.", scores: {Calvin:3,Edwards:1} }, { text: "El amor al prójimo significa que toda la vida —incluida la economía— debe transformarse.", scores: {Wesley:2,Bonhoeffer:2} }, { text: "Los bienes materiales son reales pero secundarios: el viaje hacia Dios es lo que importa.", scores: {Teresa:3,Augustine:1} } ]},
      { text: "¿Cómo describes la oración?", options: [ { text: "Una comunión profunda y sin palabras: el alma aquietada ante la presencia divina.", scores: {Teresa:3,Maximus:1} }, { text: "Una conversación apasionada con un Dios que ha hecho promesas claras.", scores: {Luther:3,Calvin:1} }, { text: "Los afectos del corazón elevados hacia Dios: el amor es el lenguaje más verdadero.", scores: {Edwards:3,Augustine:1} }, { text: "Litúrgica, comunitaria y sacramental: todo el Cuerpo de Cristo orando a una voz.", scores: {Chrysostom:3,Athanasius:1} } ]},
      { text: "¿Qué aspecto de Jesús te cautiva más?", options: [ { text: "Su sacrificio expiatorio: el que cargó con nuestro pecado y satisfizo la justicia divina.", scores: {Anselm:3,Luther:2,Calvin:1} }, { text: "Su resurrección: el 'Sí' triunfante de Dios sobre la muerte y los poderes opuestos.", scores: {Barth:3,Athanasius:2} }, { text: "Su humanidad y enseñanza: el Verbo hecho carne, mostrándonos cómo vivir.", scores: {Lewis:3,Chrysostom:1} }, { text: "Su señorío cósmico: aquel en quien todas las cosas se mantienen unidas.", scores: {Maximus:3,Athanasius:1} } ]},
      { text: "¿Cómo enfrentas las temporadas de duda o sequedad espiritual?", options: [ { text: "Construyo argumentos: si Dios existe, ¿qué sigue? La razón despeja la niebla.", scores: {Lewis:3,Anselm:2} }, { text: "Vuelvo a la Palabra y sus promesas: no mis sentimientos, sino lo que Dios ha dicho.", scores: {Luther:3,Barth:1} }, { text: "Persevero en la oración contemplativa hasta que la oscuridad ceda ante la luz.", scores: {Teresa:3,Maximus:1} }, { text: "La duda me llama a la acción: la fe se prueba en la obediencia costosa.", scores: {Bonhoeffer:3,Wesley:1} } ]},
      { text: "¿Qué es lo que más te atrae de la teología?", options: [ { text: "Una lucha de toda la vida con el pecado, la inquietud y el hambre profunda de Dios.", scores: {Augustine:3,Luther:1} }, { text: "Un anhelo de conocer a Dios, no meramente saber sobre Dios.", scores: {Teresa:3,Edwards:2,Maximus:1} }, { text: "El deseo de defender y articular la fe entregada a los santos de una vez por todas.", scores: {Athanasius:3,Anselm:2} }, { text: "La belleza abrumadora y el terror de la soberana majestad de Dios.", scores: {Edwards:3,Calvin:1} } ]},
      { text: "¿Cómo deberían los cristianos comprometerse con el mundo político?", options: [ { text: "Dos reinos: la iglesia no debe ser capturada por el estado, ni abandonarlo.", scores: {Luther:3,Augustine:1} }, { text: "Toda la vida cae bajo la soberanía de Dios: la Escritura debe dar forma a la sociedad.", scores: {Calvin:3,Edwards:1} }, { text: "Cuando el estado se vuelve demoníaco, la iglesia debe resistir, incluso a costa de la vida.", scores: {Bonhoeffer:3} }, { text: "La justicia para los pobres es una demanda política: la iglesia debe hablar claro.", scores: {Chrysostom:3,Wesley:1} } ]},
      { text: "¿Cuál es tu visión del mundo creado?", options: [ { text: "La creación es un regalo cuya vocación es ser ofrecida de vuelta a Dios en amor.", scores: {Maximus:3,Athanasius:1} }, { text: "La creación refleja la ley eterna y apunta, por la razón, hacia su Creador.", scores: {Aquinas:3,Lewis:1} }, { text: "La creación está caída pero es redimible: la belleza permanece con rastros de Dios.", scores: {Augustine:3,Lewis:1} }, { text: "El mundo es un teatro de la gloria de Dios: su soberanía está escrita en cada rincón.", scores: {Calvin:3,Edwards:2} } ]},
      { text: "¿Qué pregunta teológica te inquieta más?", options: [ { text: "¿Por qué pecamos tan persistentemente y cómo puede la gracia liberarnos?", scores: {Augustine:3,Luther:1} }, { text: "¿Cómo encuentra toda la creación su unidad y su fin en el Logos eterno?", scores: {Maximus:3,Athanasius:1} }, { text: "¿Qué es el alma y cómo asciende mediante la oración hacia la unión con Dios?", scores: {Teresa:3,Augustine:1} }, { text: "¿Cómo se siente el nuevo nacimiento y cómo crece la santidad real en nosotros?", scores: {Wesley:3,Edwards:2} } ]},
      { text: "¿Qué frase resuena más con tu corazón teológico?", options: [ { text: "\"Nuestro corazón está inquieto hasta que descanse en ti.\" — Agustín", scores: {Augustine:3} }, { text: "\"Él se hizo hombre para que nosotros pudiéramos ser hechos Dios.\" — Atanasio", scores: {Athanasius:3,Maximus:1} }, { text: "\"El Logos mantiene todas las cosas unidas y las atrae a casa.\" — Máximo", scores: {Maximus:3} }, { text: "\"La gracia no destruye la naturaleza, sino que la perfecciona.\" — Tomás de Aquino", scores: {Aquinas:3} }, { text: "\"Credo ut intelligam: Creo para entender.\" — Anselmo", scores: {Anselm:3} }, { text: "\"Aquí estoy. No puedo hacer otra cosa.\" — Lutero", scores: {Luther:3} }, { text: "\"No nos pertenecemos a nosotros mismos; pertenecemos a Dios.\" — Calvino", scores: {Calvin:3} }, { text: "\"La Palabra de Dios no puede ser prisionera: debe ser oída de nuevo.\" — Barth", scores: {Barth:3} }, { text: "\"Creo en el cristianismo como creo que el sol ha salido.\" — Lewis", scores: {Lewis:3} }, { text: "\"El alma en oración es como quien comienza a morir al mundo.\" — Teresa", scores: {Teresa:3} }, { text: "\"La gracia barata es el enemigo mortal de nuestra iglesia.\" — Bonhoeffer", scores: {Bonhoeffer:3} }, { text: "\"La riqueza que guardas es robada a los pobres.\" — Crisóstomo", scores: {Chrysostom:3} }, { text: "\"La verdadera religión no es más que el amor a Dios y al hombre.\" — Wesley", scores: {Wesley:3} }, { text: "\"El corazón no tiene descanso hasta que tiembla ante la belleza de Dios.\" — Edwards", scores: {Edwards:3} } ]}
    ]
  }
};

let current = 0;
let answers = [];
let lang = 'en';

function setLanguage(l) {
  lang = l;
  const d = data[lang];
  document.getElementById('pageTitle').innerText = d.title;
  document.getElementById('quizTitle').innerText = d.title;
  document.getElementById('quizSubtitle').innerText = d.subtitle;
  document.getElementById('labelScoring').innerText = d.showScoringLabel;
  document.getElementById('langSelect').value = lang;
  
  const m = d.modal;
  document.getElementById('modalBody').innerHTML = `
    <h2>${m.title}</h2>
    <p>${m.p1}</p>
    <p>${m.p2}</p>
    <p>${m.p3}</p>
    <hr>
    <h3>${m.imprintTitle}</h3>
    <p>${m.serviceProvider}</p>
    <p>${m.contact}</p>
    <p>${m.responsible}</p>
    <p><strong>${m.disclaimerTitle}:</strong><br>${m.disclaimerText}</p>
  `;
  
  renderQuestion();
}

function toggleScoring(active) {
  document.getElementById('body').classList.toggle('scoring-active', active);
}

function getScores() {
  const scores = {};
  const theologiansList = Object.keys(data['en'].theologians); // Use 'en' as reference keys
  for (const k of theologiansList) scores[k] = 0;
  for (let i = 0; i < data[lang].questions.length; i++) {
    if (answers[i] === undefined || answers[i] === null) continue;
    const opt = data[lang].questions[i].options[answers[i]];
    for (const [k, v] of Object.entries(opt.scores)) {
      if (scores[k] !== undefined) scores[k] += v;
    }
  }
  return scores;
}

function renderQuestion() {
  const d = data[lang];
  const q = d.questions[current];
  const pct = Math.round((current / d.questions.length) * 100);
  const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N'];
  
  document.getElementById('quizArea').innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>${d.questionLabel} ${current + 1} ${d.ofLabel} ${d.questions.length}</span>
        <span>${pct}% ${d.completeLabel}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-block">
      <div class="question-number">${d.questionLabel} ${current + 1}</div>
      <div class="question-text">${q.text}</div>
      <div class="options" id="opts">
        ${q.options.map((o,i) => {
          const scoreSummary = Object.entries(o.scores).map(([k,v])=>`${d.theologians[k].name} (+${v})`).join(', ');
          return `
          <div class="option ${answers[current]===i?'selected':''}" onclick="selectOption(${i})">
            <div class="opt-letter">${letters[i]}</div>
            <div class="opt-text">${o.text}</div>
            <div class="opt-info">
              <span class="info-icon">ℹ️</span>
              <div class="info-tooltip">${scoreSummary}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="nav">
        ${current > 0 ? `<button class="btn btn-secondary" onclick="goBack()">${d.backBtn}</button>` : ''}
        <button class="btn btn-primary" id="nextBtn" onclick="goNext()" ${answers[current]===undefined || answers[current]===null?'disabled':''}>
          ${current < d.questions.length-1 ? d.continueBtn : d.resultBtn}
        </button>
      </div>
    </div>`;
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el,idx) => el.classList.toggle('selected', idx===i));
  const btn = document.getElementById('nextBtn');
  if (btn) btn.disabled = false;
}

function goNext() {
  if (answers[current] === undefined || answers[current] === null) return;
  if (current < data[lang].questions.length-1) { current++; renderQuestion(); }
  else renderResult();
}
function goBack() { if (current > 0) { current--; renderQuestion(); } }

function renderResult() {
  const d = data[lang];
  const scores = getScores();
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const topKey = sorted[0][0];
  const maxPts = sorted[0][1];
  const t = d.theologians[topKey];

  const bars = sorted.map(([k,v],idx) => {
    const pct = maxPts > 0 ? Math.round((v/maxPts)*100) : 0;
    return `<div class="score-row">
      <div class="score-row-label"><span>${d.theologians[k].name}</span><span>${v} ${d.ptsLabel}</span></div>
      <div class="score-bar-track">
        <div class="score-bar-fill ${idx===0?'is-top':''}" data-pct="${pct}" style="width:0%"></div>
      </div>
    </div>`;
  }).join('');

  const icons = { Augustine:"📜", Athanasius:"⛪", Aquinas:"⚖️", Anselm:"🔑", Luther:"🔥", Calvin:"🏛️", Chrysostom:"🗣️", Maximus:"✨", Barth:"📖", Edwards:"⚡", Wesley:"🕊️", Lewis:"🦁", Teresa:"🌹", Bonhoeffer:"✝️" };

  document.getElementById('quizArea').innerHTML = `
    <div class="result-block">
      <span class="result-icon">${icons[topKey]}</span>
      <div class="result-label">${d.resultLead}</div>
      <div class="result-name">${t.name}</div>
      <div class="result-tradition">${t.tradition}</div>
      <div class="result-dates">${t.dates}</div>
      <div class="result-divider"></div>
      <p class="result-desc">${t.desc}</p>
      <div class="result-traits">${t.traits.map(tr=>`<span class="trait">${tr}</span>`).join('')}</div>
      <div class="result-divider"></div>
      <div class="score-section-label">${d.affinityLabel}</div>
      <div class="score-chart">${bars}</div>
      <div class="nav" style="justify-content:center;margin-top:1.5rem;">
        <button class="btn btn-primary" onclick="restartQuiz()">${d.restartBtn}</button>
      </div>
    </div>`;

  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(el => { el.style.width = el.dataset.pct + '%'; });
  }, 100);
}

function restartQuiz() {
  current = 0;
  answers = [];
  renderQuestion();
}

// Modal Logic
const modal = document.getElementById("infoModal");
const infoBtn = document.getElementById("infoBtn");
const closeBtn = document.getElementById("closeModal");

infoBtn.onclick = function() { modal.style.display = "block"; }
closeBtn.onclick = function() { modal.style.display = "none"; }
window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

// Detect language from URL or browser
const urlParams = new URLSearchParams(window.location.search);
const langParam = urlParams.get('lang');
const supported = ['en', 'de', 'fr', 'es'];

if (langParam && supported.includes(langParam)) {
  lang = langParam;
} else {
  const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
  if (supported.includes(userLang)) lang = userLang;
}

setLanguage(lang);
</script>
